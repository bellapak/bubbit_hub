<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>버빗 통합 브랜드 관리 허브</title>
<style>
/* ─── 디자인 시스템 & 변수 ─── */
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

:root {
  --primary: #111827; 
  --primary-hover: #374151;
  --bg-app: #F9FAFB;
  --bg-surface: #FFFFFF;
  --text-main: #111827;
  --text-sub: #4B5563;
  --text-light: #9CA3AF;
  --border: #E5E7EB;
  
  --status-draft: #F3F4F6;
  --status-review: #FEF3C7;
  --status-review-text: #D97706;
  --status-approved: #D1FAE5;
  --status-approved-text: #059669;
  
  --font: 'Pretendard', -apple-system, sans-serif;
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
  --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
  --radius: 8px;
  --transition: all 0.2s ease-in-out;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background-color: var(--bg-app); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; font-size: 13px; -webkit-font-smoothing: antialiased; letter-spacing: -0.2px; }

/* ─── 레이아웃 ─── */
#app { display: flex; width: 100%; height: 100%; }

.sidebar { width: 240px; background-color: var(--bg-surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 24px 0; z-index: 10; }
.brand-logo { padding: 0 24px 32px; font-size: 18px; font-weight: 800; color: var(--text-main); letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
.brand-logo::before { content: ''; display: block; width: 16px; height: 16px; background: var(--text-main); border-radius: 4px; }

.nav-group { margin-bottom: 32px; }
.nav-title { padding: 0 24px; font-size: 10px; font-weight: 700; color: var(--text-light); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
.nav-item { display: flex; align-items: center; padding: 10px 24px; color: var(--text-sub); text-decoration: none; font-weight: 500; cursor: pointer; transition: var(--transition); border-left: 2px solid transparent; }
.nav-item:hover { background-color: var(--bg-app); color: var(--text-main); }
.nav-item.active { background-color: #F3F4F6; color: var(--text-main); border-left-color: var(--text-main); font-weight: 700; }
.nav-item .prefix { font-size: 11px; margin-right: 12px; color: var(--text-light); font-weight: 400; font-family: monospace; }

.main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg-app); }

.topbar { height: 60px; background-color: var(--bg-surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 32px; z-index: 5; }
.topbar-title { font-size: 16px; font-weight: 700; }
.topbar-actions { display: flex; align-items: center; gap: 12px; }

.view-container { flex: 1; overflow-y: auto; padding: 32px; position: relative; }
.view { display: none; animation: fadeIn 0.3s ease; }
.view.active { display: block; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* ─── 공통 컴포넌트 ─── */
.btn { padding: 8px 14px; border-radius: 6px; font-family: var(--font); font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: var(--bg-surface); color: var(--text-main); transition: var(--transition); }
.btn:hover { background: var(--bg-app); border-color: var(--text-sub); }
.btn-primary { background: var(--primary); color: white; border-color: var(--primary); }
.btn-primary:hover { background: var(--primary-hover); color: white; border-color: var(--primary-hover); }

.card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow-sm); }
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.card-title { font-size: 14px; font-weight: 700; }

.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px; }
.grid-2 { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 20px; }

.badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; letter-spacing: 0.3px; }
.badge.draft { background: var(--status-draft); color: var(--text-sub); }
.badge.review { background: var(--status-review); color: var(--status-review-text); }
.badge.approved { background: var(--status-approved); color: var(--status-approved-text); }

.data-table { width: 100%; border-collapse: collapse; }
.data-table th, .data-table td { padding: 14px 16px; text-align: left; border-bottom: 1px solid var(--border); font-size: 12px; }
.data-table th { color: var(--text-light); font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }
.data-table tbody tr:hover { background-color: var(--bg-app); cursor: pointer; }

.asset-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
.asset-card { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; background: var(--bg-surface); transition: var(--transition); }
.asset-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); border-color: var(--text-main); }
.asset-thumb { height: 160px; background: var(--bg-app); display: flex; align-items: center; justify-content: center; color: var(--text-light); font-size: 11px; font-weight: 600; letter-spacing: 1px; }
.asset-info { padding: 16px; }
.asset-title { font-weight: 700; font-size: 13px; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.asset-meta { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--text-sub); }

.inner-tabs { display: flex; gap: 24px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
.inner-tab { padding: 12px 4px; font-size: 13px; font-weight: 600; color: var(--text-light); cursor: pointer; border-bottom: 2px solid transparent; transition: var(--transition); }
.inner-tab.active { color: var(--text-main); border-bottom-color: var(--text-main); }

#toast { position: fixed; bottom: 24px; right: 24px; background: var(--text-main); color: #fff; padding: 12px 24px; border-radius: 6px; font-size: 12px; font-weight: 600; opacity: 0; pointer-events: none; transition: var(--transition); z-index: 300; transform: translateY(10px); }
#toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<div id="app">
  <nav class="sidebar">
    <div class="brand-logo">Bubbit Hub</div>
    
    <div class="nav-group">
      <div class="nav-title">Overview</div>
      <div class="nav-item active" onclick="switchView('dashboard', this)">
        <span class="prefix">01</span> 통합 대시보드
      </div>
    </div>
    
    <div class="nav-group">
      <div class="nav-title">Workspace</div>
      <div class="nav-item" onclick="switchView('content', this)">
        <span class="prefix">02</span> 제품 및 콘텐츠 허브
      </div>
      <div class="nav-item" onclick="switchView('campaign', this)">
        <span class="prefix">03</span> 일정 및 캠페인 관리
      </div>
      <div class="nav-item" onclick="switchView('guide', this)">
        <span class="prefix">04</span> 브랜드 가이드라인
      </div>
    </div>
    
    <div class="nav-group">
      <div class="nav-title">Data & Settings</div>
      <div class="nav-item" onclick="switchView('data', this)">
        <span class="prefix">05</span> 빅데이터 연동 허브
      </div>
      <div class="nav-item" onclick="switchView('settings', this)">
        <span class="prefix">06</span> 권한 및 연동 설정
      </div>
    </div>
  </nav>

  <main class="main-content">
    <header class="topbar">
      <div class="topbar-title" id="current-page-title">통합 대시보드</div>
      <div class="topbar-actions">
        <button class="btn" style="border: none; background: transparent;">알림 (0)</button>
        <button class="btn btn-primary" onclick="createNewTask()">새 작업 생성</button>
      </div>
    </header>

    <div class="view-container">
      
      <div id="view-dashboard" class="view active">
        <div class="grid-3" id="dashboard-stats">
          </div>

        <div class="grid-2">
          <div class="card">
            <div class="card-header">
              <span class="card-title">최근 작업 워크플로우</span>
            </div>
            <table class="data-table">
              <thead>
                <tr>
                  <th>작업명</th>
                  <th>채널</th>
                  <th>상태</th>
                </tr>
              </thead>
              <tbody id="dashboard-workflow-table">
                </tbody>
            </table>
          </div>
          <div class="card">
            <div class="card-header">
              <span class="card-title">주요 연동 지표</span>
            </div>
            <div style="display: flex; flex-direction: column; gap: 12px;" id="dashboard-metrics">
               </div>
          </div>
        </div>
      </div>

      <div id="view-content" class="view">
        <div class="inner-tabs">
          <div class="inner-tab active">에셋 라이브러리</div>
          <div class="inner-tab">AI 콘텐츠 생성기</div>
        </div>
        
        <div class="card-header">
          <div style="display: flex; gap: 8px;">
            <select class="btn"><option>전체 카테고리</option></select>
          </div>
          <button class="btn btn-primary" onclick="triggerFileUpload()">자산 업로드</button>
        </div>

        <div class="asset-grid" id="content-asset-grid">
           </div>
      </div>

      <div id="view-campaign" class="view"><div class="card"><div class="card-header"><span class="card-title">캠페인 캘린더 모듈 로드 중...</span></div></div></div>
      <div id="view-guide" class="view"><div class="card"><div class="card-header"><span class="card-title">브랜드 가이드라인 데이터 로드 중...</span></div></div></div>
      <div id="view-data" class="view"><div class="card"><div class="card-header"><span class="card-title">빅데이터 API 호출 중...</span></div></div></div>
      <div id="view-settings" class="view"><div class="card"><div class="card-header"><span class="card-title">설정 데이터 로드 중...</span></div></div></div>

    </div>
  </main>
</div>

<div id="toast">메시지</div>


<script type="module">
  // 1. 파이어베이스 라이브러리 불러오기 (CDN 방식)
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  // 2. 내 파이어베이스 프로젝트의 고유 열쇠 (파이어베이스 콘솔에서 복사한 값을 여기에 덮어쓰세요)
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyDFxVAAkgut4hsmafMMxRo2Ge2P7td6JOs",
  authDomain: "bubbit-hub.firebaseapp.com",
  projectId: "bubbit-hub",
  storageBucket: "bubbit-hub.firebasestorage.app",
  messagingSenderId: "183100911164",
  appId: "1:183100911164:web:c1a1fa4b273d9ddccf5d39",
  measurementId: "G-5Z8QDJQ8SV"
};

  // 3. 파이어베이스 시작 및 데이터베이스 연결
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // --- UI 화면 동작을 위한 기존 스크립트 유지 ---
  window.switchView = function(viewId, element) {
    document.querySelectorAll('.view').forEach(view => view.classList.remove('active'));
    const targetView = document.getElementById('view-' + viewId);
    if(targetView) targetView.classList.add('active');
    
    document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
    if(element) {
      element.classList.add('active');
      const titleText = element.innerText.replace(/^[0-9]+\s*/, '');
      document.getElementById('current-page-title').innerText = titleText;
    }
  };

  window.showToast = function(msg) {
    const toast = document.getElementById('toast');
    toast.innerText = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  };

  // 4. 새 작업 생성 버튼 클릭 시 데이터베이스에 진짜로 저장하는 기능
  window.createNewTask = async function() {
    try {
      // 'tasks'라는 폴더를 만들고 새로운 문서 저장
      const docRef = await addDoc(collection(db, "tasks"), {
        title: "신규 캠페인 작업",
        createdAt: new Date().toISOString(),
        status: "draft"
      });
      window.showToast("서버(파이어베이스)에 새 작업이 안전하게 저장되었습니다!");
    } catch (e) {
      console.error("저장 실패: ", e);
      window.showToast("저장에 실패했습니다. 콘솔 창을 확인해주세요.");
    }
  };

  // 초기화면 세팅
  window.addEventListener('DOMContentLoaded', () => {
    window.switchView('dashboard', document.querySelector('.nav-item.active'));
  });
</script>
</script>
</body>
</html>
