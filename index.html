<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>통합 대시보드 - 버빗 허브</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
<nav class="sidebar">
    <div class="brand-logo">Bubbit Hub</div>
    
    <div class="nav-label">WORKSPACE</div>
    <a href="index.html" class="nav-item">01 통합 대시보드</a>
    <a href="content.html" class="nav-item">02 제품 및 콘텐츠</a>
    <a href="campaign.html" class="nav-item">03 일정 및 캘린더</a>
    <a href="promotion.html" class="nav-item">04 행사 및 프로모션</a>
    
    <div class="nav-label">MANAGEMENT</div>
    <a href="cs.html" class="nav-item">05 CS 및 VOC 관리</a>
    <a href="issue.html" class="nav-item">06 이슈 로그</a>
    <a href="guide.html" class="nav-item">07 브랜드 가이드라인</a>
    <a href="data.html" class="nav-item">08 빅데이터 연동</a>
    <a href="account_issue.html" class="nav-item">09 계정 관리</a>
  </nav>
  <main class="main-content">
    <header class="topbar">
      <div class="topbar-title">
        <a href="index.html" class="btn" style="padding:10px 14px;font-size:14px;">홈</a>
        <span>통합 대시보드</span>
      </div>
      <div style="display:flex; gap:12px;">
        <input type="text" id="search-input" class="input-field" style="width:240px; margin:0;" placeholder="내용 검색" onkeyup="searchTable()">
        <button class="btn btn-primary" onclick="openTaskModal()">캠페인·일정 등록</button>
      </div>
    </header>
    <div class="view-container">
      <div class="grid-3">
        <div class="card">
          <div style="color:var(--text-sub); font-weight:600; margin-bottom:12px;">진행 중 캠페인</div>
          <div id="dash-camp-cnt" style="font-size:32px; font-weight:700;">0건</div>
        </div>
        <div class="card">
          <div style="color:var(--text-sub); font-weight:600; margin-bottom:12px;">등록된 타임라인</div>
          <div id="dash-task-cnt" style="font-size:32px; font-weight:700;">0건</div>
        </div>
        <div class="card">
          <div style="color:var(--text-sub); font-weight:600; margin-bottom:12px;">브랜드 계정 수</div>
          <div id="dash-acc-cnt" style="font-size:32px; font-weight:700;">0개</div>
        </div>
      </div>
      <div class="grid-2">
        <div class="card">
          <div class="card-header"><span class="card-title">최근 등록된 캠페인·일정</span></div>
          <table class="data-table">
            <thead><tr><th>캠페인명 및 기한</th><th>채널</th><th>상태</th></tr></thead>
            <tbody id="dash-recent-list"></tbody>
          </table>
        </div>
        <div class="card">
          <div class="card-header">
            <span class="card-title">브랜드 계정 요약</span>
            <a href="account_issue.html" style="font-size:14px; color:var(--text-sub); font-weight:600;">전체보기</a>
          </div>
          <table class="data-table">
            <thead><tr><th>서비스</th><th>아이디</th></tr></thead>
            <tbody id="dash-acc-list"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<div id="task-modal" class="modal-overlay">
  <div class="modal-box">
    <h3 style="margin-bottom: 24px; font-size: 18px; font-weight: 700;">캠페인 및 일정 등록</h3>
    <input id="task-title" class="input-field" placeholder="캠페인 / 일정 제목" style="margin-bottom: 12px;">
    <input type="date" id="task-date" class="input-field" style="margin-bottom: 12px;" title="목표 기한">
    <select id="task-channel" class="input-field" style="margin-bottom: 12px;">
      <option value="Instagram">Instagram</option>
      <option value="Meta Ads">Meta</option>
      <option value="자사몰">자사몰</option>
      <option value="기타(내부일정)">기타(내부일정)</option>
    </select>
    <textarea id="task-desc" class="input-field" rows="4" placeholder="상세 내용 요약" style="margin-bottom: 24px; resize:vertical;"></textarea>
    <div style="display: flex; gap: 10px; justify-content: flex-end;">
      <button class="btn" onclick="closeTaskModal()">취소</button>
      <button class="btn btn-primary" onclick="saveNewTask()">저장하기</button>
    </div>
  </div>
</div>

<div id="toast">메시지</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  const firebaseConfig = { apiKey: "AIzaSyDFxVAAkgut4hsmafMMxRo2Ge2P7td6JOs", authDomain: "bubbit-hub.firebaseapp.com", projectId: "bubbit-hub", storageBucket: "bubbit-hub.firebasestorage.app", messagingSenderId: "183100911164", appId: "1:183100911164:web:c1a1fa4b273d9ddccf5d39" };
  const db = getFirestore(initializeApp(firebaseConfig));

  window.openTaskModal = () => document.getElementById('task-modal').style.display = 'flex';
  window.closeTaskModal = () => document.getElementById('task-modal').style.display = 'none';

  window.saveNewTask = async () => {
    const title = document.getElementById('task-title').value;
    const targetDate = document.getElementById('task-date').value;
    const channel = document.getElementById('task-channel').value;
    const desc = document.getElementById('task-desc').value;
    if(!title) return;
    try {
      await addDoc(collection(db, "tasks"), { 
        title: title, 
        targetDate: targetDate || "-", // 날짜 데이터 추가
        channel: channel, 
        description: desc, 
        status: "대기중", 
        createdAt: new Date().toISOString() 
      });
      closeTaskModal(); showToast("저장되었습니다");
      
      // 입력창 초기화
      document.getElementById('task-title').value = '';
      document.getElementById('task-date').value = '';
      document.getElementById('task-desc').value = '';
    } catch (e) { showToast("실패했습니다"); }
  };

  onSnapshot(collection(db, "tasks"), (snap) => {
    document.getElementById('dash-task-cnt').innerText = snap.docs.length + "건";
    const tbody = document.getElementById('dash-recent-list'); tbody.innerHTML = '';
    
    // 최신순 정렬
    const docs = snap.docs.map(doc => doc.data()).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
    
    docs.slice(0, 5).forEach(d => {
      // 제목 아래에 날짜를 토스 스타일로 작게 표시
      tbody.innerHTML += `<tr class="searchable-row">
        <td>
          <strong>${d.title}</strong>
          <div style="font-size:12px; color:var(--text-sub); margin-top:4px; font-weight:500;">기한: ${d.targetDate}</div>
        </td>
        <td>${d.channel}</td>
        <td><span class="badge" style="background:#F2F4F6;color:#8B95A1">${d.status}</span></td>
      </tr>`;
    });
  });

  onSnapshot(collection(db, "accounts"), (snap) => {
    document.getElementById('dash-acc-cnt').innerText = snap.docs.length + "개";
    const tbody = document.getElementById('dash-acc-list'); tbody.innerHTML = '';
    snap.docs.slice(0, 5).forEach(doc => {
      const d = doc.data();
      tbody.innerHTML += `<tr class="searchable-row"><td>${d.service}</td><td style="color:var(--text-sub)">${d.id}</td></tr>`;
    });
  });

  onSnapshot(collection(db, "campaigns"), (snap) => document.getElementById('dash-camp-cnt').innerText = snap.docs.length + "건");

  window.searchTable = function() {
    const keyword = document.getElementById('search-input').value.toLowerCase();
    document.querySelectorAll('.searchable-row, .searchable-item').forEach(el => {
      el.style.display = el.innerText.toLowerCase().includes(keyword) ? '' : 'none';
    });
  };
  window.showToast = function(msg) {
    const t = document.getElementById('toast'); t.innerText = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  };
</script>
</body>
</html>
