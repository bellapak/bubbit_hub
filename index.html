<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/><title>통합 대시보드 - 버빗 허브</title><link href="style.css" rel="stylesheet"/></head><body><div id="app"><main class="main-content" data-page="dashboard">

<div class="view-container">
<div class="grid-3">
<div class="card">진행 중 일정<div style="font-size:24px; font-weight:700;"><span id="dash-active-cnt">0건</span></div></div>
<div class="card">예정 일정<div style="font-size:24px; font-weight:700;"><span id="dash-high-cnt">0건</span></div></div>
<div class="card">연동 계정<div style="font-size:24px; font-weight:700;"><span id="dash-acc-cnt">0개</span></div></div>
</div>
<div class="grid-2">
<div class="card">
<h3>전체 일정 요약</h3>
<table class="data-table">
<thead><tr><th>정보</th><th>채널</th><th>구분</th><th>상태</th></tr></thead>
<tbody id="dash-recent-list"></tbody>
</table>
</div>
<div class="card">
<h3>브랜드 계정</h3>
<table class="data-table">
<tbody id="dash-acc-list"></tbody>
</table>
</div>
</div>
</div>
</main></div><div class="modal-overlay" id="task-modal">
<div class="modal-box" style="width: 440px;">
<h3 style="margin-bottom: 24px; font-size: 18px; font-weight: 700;">새 일정 등록</h3>
<input class="input-field" id="task-title" placeholder="일정 제목" style="margin-bottom: 12px;"/>
<input class="input-field" id="task-date" style="margin-bottom: 12px;" title="시작일" type="date"/>
<input class="input-field" id="task-end-date" style="margin-bottom: 12px;" title="종료일" type="date"/>
<input class="input-field" id="task-owner" placeholder="담당자 이름" style="margin-bottom: 12px;"/>
<select class="input-field" id="task-status" style="margin-bottom: 12px;">
<option value="예정">예정</option>
<option value="진행중">진행중</option>
<option value="완료">완료</option>
<option value="보류">보류</option>
</select>
<select class="input-field" id="task-channel" style="margin-bottom: 12px;">
<option value="인스타그램">인스타그램</option>
<option value="자사몰">자사몰</option>
<option value="CRM">CRM</option>
<option value="광고">광고</option>
<option value="네이버">네이버</option>
<option value="카카오">카카오</option>
<option value="타사몰">타사몰</option>
<option value="내부행사">내부행사</option>
</select>
<select class="input-field" id="task-marketing-type" style="margin-bottom: 12px;">
<option value="콘텐츠 운영">콘텐츠 운영</option>
<option value="광고 집행">광고 집행</option>
<option value="CRM 발송">CRM 발송</option>
<option value="프로모션">프로모션</option>
<option value="라이브/행사">라이브/행사</option>
<option value="운영 공지">운영 공지</option>
<option value="기타">기타</option>
</select>
<textarea class="input-field" id="task-desc" placeholder="상세 내용 요약" rows="4" style="margin-bottom: 24px; resize:vertical;"></textarea>
<div style="display: flex; gap: 10px; justify-content: flex-end;">
<button class="btn" onclick="closeTaskModal()">취소</button>
<button class="btn btn-primary" onclick="saveNewSchedule()">저장하기</button>
</div>
</div>
</div><div id="toast">메시지</div><script src="./layout.js" type="module"></script><script type="module">
  import { db, requireAuth } from "./firebase.js";
  import { collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const safeText = (value = "") => String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");

  function toLocalDate(ymd) {
    if (!ymd) return null;
    const [y, m, d] = String(ymd).split("-").map(Number);
    if (!y || !m || !d) return null;
    return new Date(y, m - 1, d);
  }
  function todayLocalDate() { const n = new Date(); return new Date(n.getFullYear(), n.getMonth(), n.getDate()); }
  function formatDateFull(ymd) { const d = toLocalDate(ymd); if (!d) return "-"; return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")}`; }
  function formatDateShort(ymd) { const d = toLocalDate(ymd); if (!d) return "-"; return `${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")}`; }
  function diffDays(a, b) { return Math.round((toLocalDate(b) - toLocalDate(a)) / 86400000); }
  function getDurationText(startDate, endDate) { if (!startDate) return "-"; const end = endDate || startDate; const days = Math.max(1, diffDays(startDate, end) + 1); const weeks = Math.round((days / 7) * 10) / 10; return `${days}일간 (${weeks.toFixed(1)}주)`; }
  function getDdayStatus(startDate, endDate) {
    if (!startDate) return "-";
    const start = toLocalDate(startDate), end = toLocalDate(endDate || startDate), today = todayLocalDate();
    if (today > end) return "✅ 종료";
    if (today < start) return `D-${Math.max(1, Math.round((start - today) / 86400000))}`;
    if (+today === +start) return "🚀 D-day";
    return "🔵 진행중";
  }
  function getScheduleStatus(item) {
    if (item.status && !item.source) return item.status;
    const dday = getDdayStatus(item.startDate || item.date, item.endDate || item.date);
    if (dday.includes("종료")) return "완료";
    if (dday.includes("진행중") || dday.includes("D-day")) return "진행중";
    return "예정";
  }
  function buildSlackShareText(item) {
    const startDate = item.startDate || item.date;
    const endDate = item.endDate || item.date;
    return [
      "🚀 [버빗 마케팅 실행 알림]",
      "━━━━━━━━━━━━━━",
      `📅 일정: ${formatDateFull(startDate)} ~ ${formatDateShort(endDate)} [${getDurationText(startDate, endDate)}]`,
      `▫️ 상태: ${getDdayStatus(startDate, endDate)}`,
      `▫️ 채널: ${item.channel || "-"}`,
      `▫️ 구분: ${item.marketingType || item.priority || "-"}`,
      `▫️ 상세: ${item.desc || item.title || "-"}`
    ].join("\n");
  }

  requireAuth(() => {
    window.openTaskModal = () => document.getElementById("task-modal").style.display = "flex";
    window.closeTaskModal = () => document.getElementById("task-modal").style.display = "none";

    window.saveNewSchedule = async () => {
      const title = document.getElementById("task-title").value.trim();
      const date = document.getElementById("task-date").value;
      const endDate = document.getElementById("task-end-date").value || date;
      const owner = document.getElementById("task-owner").value.trim();
      const status = document.getElementById("task-status").value;
      const channel = document.getElementById("task-channel").value;
      const marketingType = document.getElementById("task-marketing-type").value;
      const desc = document.getElementById("task-desc").value.trim();
      if (!title || !date) { alert("제목과 시작일을 입력해주세요."); return; }
      if (toLocalDate(endDate) < toLocalDate(date)) { alert("종료일은 시작일보다 빠를 수 없습니다."); return; }
      try {
        const item = { title, date, startDate: date, endDate, owner, status, channel, marketingType, desc: desc || title, priority: "보통", source: "dashboard", createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
        await addDoc(collection(db, "brand_schedules"), { ...item, durationText: getDurationText(date, endDate), ddayStatus: getDdayStatus(date, endDate), slackShareText: buildSlackShareText(item) });
        closeTaskModal();
        showToast("저장되었습니다.");
        ["task-title","task-date","task-end-date","task-owner","task-desc"].forEach(id => document.getElementById(id).value = "");
      } catch (e) { showToast("저장에 실패했습니다."); }
    };

    onSnapshot(collection(db, "brand_schedules"), (snap) => {
      const docs = snap.docs.map(d => d.data());
      const activeCnt = document.getElementById("dash-active-cnt");
      const highCnt = document.getElementById("dash-high-cnt");
      const tbody = document.getElementById("dash-recent-list");

      if (activeCnt) activeCnt.innerText = docs.filter(d => getScheduleStatus(d) === "진행중").length + "건";
      if (highCnt) highCnt.innerText = docs.filter(d => getScheduleStatus(d) === "예정").length + "건";

      if (!tbody) return;
      tbody.innerHTML = "";

      if (!docs.length) {
        tbody.innerHTML = `<tr><td colspan="4" style="color:var(--text-sub);text-align:center;">등록된 일정이 없습니다.</td></tr>`;
        return;
      }

      docs
        .sort((a, b) => new Date(a.startDate || a.date || 0) - new Date(b.startDate || b.date || 0))
        .slice(0, 7)
        .forEach(d => {
          const startDate = d.startDate || d.date;
          const endDate = d.endDate || d.date;
          const statusText = getDdayStatus(startDate, endDate);
          const detail = d.desc || d.title || "-";
          const type = d.marketingType || d.priority || "-";
          tbody.innerHTML += `<tr class="searchable-row">
            <td><strong style="font-size:15px;">${safeText(detail)}</strong>
              <div style="font-size:12px;color:var(--text-sub);margin-top:4px;font-weight:500;">
                일정: ${formatDateFull(startDate)} ~ ${formatDateShort(endDate)} | ${getDurationText(startDate, endDate)}
              </div>
            </td>
            <td><span style="font-weight:600;">${safeText(d.channel || "-")}</span></td>
            <td>${safeText(type)}</td>
            <td><span class="badge" style="background:#E8F3FF;color:#3182F6;">${safeText(statusText)}</span></td>
          </tr>`;
        });
    });

    onSnapshot(collection(db, "accounts"), (snap) => {
      const accCnt = document.getElementById("dash-acc-cnt");
      const tbody = document.getElementById("dash-acc-list");

      if (accCnt) accCnt.innerText = snap.docs.length + "개";
      if (!tbody) return;

      tbody.innerHTML = "";
      snap.docs.slice(0, 5).forEach(doc => {
        const d = doc.data();
        tbody.innerHTML += `<tr class="searchable-row">
          <td><strong>${safeText(d.service || "-")}</strong></td>
          <td style="color:var(--text-sub)">${safeText(d.id || "-")}</td>
        </tr>`;
      });
    });
  });

  window.searchTable = function () {
    const input = document.getElementById("search-input");
    const kw = input ? input.value.toLowerCase() : "";
    document.querySelectorAll(".searchable-row, .searchable-item").forEach(el => {
      el.style.display = el.innerText.toLowerCase().includes(kw) ? "" : "none";
    });
  };
  window.showToast = function (msg) {
    const t = document.getElementById("toast"); t.innerText = msg; t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2500);
  };
</script></body></html>
