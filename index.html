<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>통합 대시보드 - 버빗 허브</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
:root { 
  --primary: #111827; --primary-hover: #374151; --bg-app: #F4F5F7; --bg-surface: #FFFFFF; 
  --text-main: #111827; --text-sub: #4B5563; --text-light: #9CA3AF; --border: #E5E7EB; 
  --font: 'Pretendard', sans-serif; --radius: 12px; --radius-sm: 8px;
  --shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg-app); color: var(--text-main); display: flex; height: 100vh; font-size: 13px; letter-spacing: -0.3px; }
#app { display: flex; width: 100%; }
.sidebar { width: 240px; background: var(--bg-surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 24px 0; z-index: 10; }
.brand-logo { padding: 0 24px 32px; font-weight: 800; font-size: 18px; color: var(--text-main); }
.nav-item { display: flex; align-items: center; padding: 12px 24px; color: var(--text-sub); text-decoration: none; font-weight: 500; transition: all 0.2s; border-left: 3px solid transparent; }
.nav-item:hover { background: var(--bg-app); color: var(--text-main); }
.nav-item.active { background: #F3F4F6; color: var(--text-main); border-left-color: var(--text-main); font-weight: 700; }
.main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar { height: 64px; background: var(--bg-surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 32px; font-size: 18px; font-weight: 700; z-index: 5; }
.view-container { flex: 1; overflow-y: auto; padding: 32px; display: flex; flex-direction: column; gap: 24px; }
.card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); }
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 16px; }
.card-title { font-size: 16px; font-weight: 800; display: flex; align-items: center; gap: 8px; margin: 0; }
.btn { padding: 8px 16px; border-radius: var(--radius-sm); font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: #fff; color: var(--text-main); font-family: var(--font); transition: all 0.2s; font-size: 13px; display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
.btn:hover { background: var(--bg-app); border-color: var(--text-sub); }
.btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
.btn-primary:hover { background: var(--primary-hover); color: #fff; }
.input-field { padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; outline: none; font-family: var(--font); width: 100%; transition: all 0.2s; }
.input-field:focus { border-color: var(--text-main); }
.data-table { width: 100%; border-collapse: collapse; }
.data-table th, .data-table td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
.badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; background: #F3F4F6; color: var(--text-sub); }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 100; }
.modal-box { background: #fff; padding: 24px; border-radius: 12px; width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
#toast { position: fixed; bottom: 24px; right: 24px; background: var(--text-main); color: #fff; padding: 12px 24px; border-radius: var(--radius-sm); font-weight: 600; opacity: 0; transition: 0.3s; z-index: 1000; box-shadow: var(--shadow); }
#toast.show { opacity: 1; transform: translateY(-10px); }
</style>
</head>
<body>
<div id="app">
  <nav class="sidebar">
    <div class="brand-logo">Bubbit Hub</div>
    <a href="index.html" class="nav-item active">01 통합 대시보드</a>
    <a href="content.html" class="nav-item">02 제품 및 콘텐츠 허브</a>
    <a href="campaign.html" class="nav-item">03 일정 및 캠페인</a>
    <a href="guide.html" class="nav-item">04 브랜드 가이드라인</a>
    <a href="data.html" class="nav-item">05 빅데이터 연동</a>
    <a href="account_issue.html" class="nav-item">06 계정 및 이슈 관리</a>
  </nav>
  <main class="main-content">
    <header class="topbar">
      <div style="display: flex; align-items: center; gap: 16px;">
        <a href="index.html" class="btn" style="text-decoration: none; padding: 6px 10px; font-size: 16px;" title="통합 대시보드로 이동">🏠</a>
        <span>통합 대시보드</span>
      </div>
      <button class="btn btn-primary" onclick="openTaskModal()">+ 새 작업 생성</button>
    </header>
    <div class="view-container">
      <div class="grid-3">
        <div class="card"><div class="card-title">진행 중 캠페인</div><div id="dash-camp-cnt" style="font-size:24px; font-weight:800;">0건</div></div>
        <div class="card"><div class="card-title">등록된 작업</div><div id="dash-task-cnt" style="font-size:24px; font-weight:800;">0건</div></div>
        <div class="card"><div class="card-title">브랜드 계정 수</div><div id="dash-acc-cnt" style="font-size:24px; font-weight:800;">0개</div></div>
      </div>
      <div class="grid-2">
        <div class="card">
          <div class="card-header"><span class="card-title">최근 등록된 작업</span></div>
          <table class="data-table">
            <thead><tr><th>작업명</th><th>채널</th><th>상태</th></tr></thead>
            <tbody id="dash-recent-list"></tbody>
          </table>
        </div>
        <div class="card">
          <div class="card-header">
            <span class="card-title">브랜드 계정 요약</span>
            <a href="account_issue.html" style="font-size:12px; color:var(--text-sub); text-decoration:none;">전체보기 ></a>
          </div>
          <table class="data-table">
            <thead><tr><th>서비스</th><th>아이디</th></tr></thead>
            <tbody id="dash-acc-list"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<div id="task-modal" class="modal-overlay">
  <div class="modal-box">
    <h3 style="margin-bottom: 16px; font-size: 18px; font-weight: 800;">새 작업 생성</h3>
    <input id="task-title" class="input-field" placeholder="작업 제목" style="margin-bottom: 12px;">
    <select id="task-channel" class="input-field" style="margin-bottom: 12px;">
      <option value="Instagram">Instagram</option>
      <option value="Meta Ads">Meta Ads</option>
      <option value="Web">자사몰</option>
    </select>
    <textarea id="task-desc" class="input-field" rows="4" placeholder="상세 내용" style="margin-bottom: 16px;"></textarea>
    <div style="display: flex; gap: 10px; justify-content: flex-end;">
      <button class="btn" onclick="closeTaskModal()">취소</button>
      <button class="btn btn-primary" onclick="saveNewTask()">저장</button>
    </div>
  </div>
</div>

<div id="toast">메시지</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  
  const firebaseConfig = {
    apiKey: "AIzaSyDFxVAAkgut4hsmafMMxRo2Ge2P7td6JOs", authDomain: "bubbit-hub.firebaseapp.com",
    projectId: "bubbit-hub", storageBucket: "bubbit-hub.firebasestorage.app",
    messagingSenderId: "183100911164", appId: "1:183100911164:web:c1a1fa4b273d9ddccf5d39"
  };
  const db = getFirestore(initializeApp(firebaseConfig));

  window.openTaskModal = () => document.getElementById('task-modal').style.display = 'flex';
  window.closeTaskModal = () => document.getElementById('task-modal').style.display = 'none';

  window.saveNewTask = async () => {
    const title = document.getElementById('task-title').value;
    const channel = document.getElementById('task-channel').value;
    const desc = document.getElementById('task-desc').value;
    if(!title) return;
    try {
      await addDoc(collection(db, "tasks"), { title, channel, description: desc, status: "대기중", createdAt: new Date().toISOString() });
      closeTaskModal();
      showToast("저장되었습니다.");
    } catch (e) { showToast("실패했습니다."); }
  };

  onSnapshot(collection(db, "tasks"), (snap) => {
    document.getElementById('dash-task-cnt').innerText = snap.docs.length + "건";
    const tbody = document.getElementById('dash-recent-list');
    tbody.innerHTML = '';
    snap.docs.slice(0, 5).forEach(doc => {
      const d = doc.data();
      tbody.innerHTML += `<tr><td><strong>${d.title}</strong></td><td>${d.channel}</td><td><span class="badge">${d.status}</span></td></tr>`;
    });
  });

  onSnapshot(collection(db, "accounts"), (snap) => {
    document.getElementById('dash-acc-cnt').innerText = snap.docs.length + "개";
    const tbody = document.getElementById('dash-acc-list');
    tbody.innerHTML = '';
    snap.docs.slice(0, 5).forEach(doc => {
      const d = doc.data();
      tbody.innerHTML += `<tr><td>${d.service}</td><td style="color:var(--text-sub)">${d.id}</td></tr>`;
    });
  });

  onSnapshot(collection(db, "campaigns"), (snap) => document.getElementById('dash-camp-cnt').innerText = snap.docs.length + "건");

  function showToast(msg) {
    const t = document.getElementById('toast'); t.innerText = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
