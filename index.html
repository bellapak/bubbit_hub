<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>통합 대시보드 - 버빗 허브</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
:root { --primary: #111827; --bg-app: #F9FAFB; --bg-surface: #FFFFFF; --text-main: #111827; --text-sub: #4B5563; --border: #E5E7EB; --font: 'Pretendard', sans-serif; --radius: 8px; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg-app); color: var(--text-main); display: flex; height: 100vh; font-size: 13px; }
#app { display: flex; width: 100%; }
.sidebar { width: 240px; background: var(--bg-surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 24px 0; }
.nav-item { display: flex; align-items: center; padding: 10px 24px; color: var(--text-sub); text-decoration: none; font-weight: 500; }
.nav-item.active { background: #F3F4F6; color: var(--text-main); border-left: 2px solid var(--text-main); font-weight: 700; }
.main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar { height: 60px; background: var(--bg-surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 32px; font-size: 16px; font-weight: 700; }
.view-container { flex: 1; overflow-y: auto; padding: 32px; }
.card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
.card-title { font-size: 14px; font-weight: 700; margin-bottom: 16px; display: block; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px; }
.data-table { width: 100%; border-collapse: collapse; }
.data-table th, .data-table td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
.badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; background: #F3F4F6; color: var(--text-sub); }
.btn { padding: 8px 16px; border-radius: 6px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: #fff; }
.btn-primary { background: var(--primary); color: #fff; border: none; }
.input-field { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; margin-bottom: 12px; font-family: var(--font); outline: none; }
/* 모달(팝업) 스타일 */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 100; }
.modal-box { background: #fff; padding: 24px; border-radius: 12px; width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
#toast { position: fixed; bottom: 24px; right: 24px; background: var(--text-main); color: #fff; padding: 12px 24px; border-radius: 6px; opacity: 0; transition: 0.3s; }
#toast.show { opacity: 1; }
</style>
</head>
<body>
<div id="app">
  <nav class="sidebar">
    <div style="padding: 0 24px 32px; font-weight: 800; font-size: 18px;">Bubbit Hub</div>
    <a href="index.html" class="nav-item active">01 통합 대시보드</a>
    <a href="content.html" class="nav-item">02 제품 및 콘텐츠 허브</a>
    <a href="campaign.html" class="nav-item">03 일정 및 캠페인</a>
    <a href="guide.html" class="nav-item">04 브랜드 가이드라인</a>
    <a href="data.html" class="nav-item">05 빅데이터 연동</a>
    <a href="account_issue.html" class="nav-item">06 계정 및 이슈 관리</a>
  </nav>
  <main class="main-content">
    <header class="topbar">
      <span>통합 대시보드</span>
      <button class="btn btn-primary" onclick="openTaskModal()">+ 새 작업 생성</button>
    </header>
    <div class="view-container">
      <div class="grid-3">
        <div class="card"><div class="card-title">진행 중 캠페인</div><div id="dash-camp-cnt" style="font-size:24px; font-weight:800;">불러오는 중...</div></div>
        <div class="card"><div class="card-title">등록된 작업</div><div id="dash-task-cnt" style="font-size:24px; font-weight:800;">불러오는 중...</div></div>
        <div class="card"><div class="card-title">오늘의 방문자</div><div style="font-size:24px; font-weight:800;">1,240명</div></div>
      </div>
      <div class="card">
        <span class="card-title">최근 등록된 작업 현황</span>
        <table class="data-table">
          <thead><tr><th>작업명</th><th>채널</th><th>상세 내용</th><th>상태</th></tr></thead>
          <tbody id="dash-recent-list"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div id="task-modal" class="modal-overlay">
  <div class="modal-box">
    <h3 style="margin-bottom: 16px;">새 작업 생성</h3>
    <input id="task-title" class="input-field" placeholder="작업 제목 (예: 여름 시즌 메타 광고)">
    <select id="task-channel" class="input-field">
      <option value="Instagram">Instagram</option>
      <option value="Meta Ads">Meta Ads</option>
      <option value="Blog">네이버 블로그</option>
      <option value="Web">자사몰</option>
    </select>
    <textarea id="task-desc" class="input-field" rows="4" style="resize: vertical;" placeholder="작업 상세 내용을 입력하세요..."></textarea>
    <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 8px;">
      <button class="btn" onclick="closeTaskModal()">취소</button>
      <button class="btn btn-primary" onclick="saveNewTask()">서버에 저장</button>
    </div>
  </div>
</div>

<div id="toast">메시지</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  
  const firebaseConfig = {
    apiKey: "AIzaSyDFxVAAkgut4hsmafMMxRo2Ge2P7td6JOs", authDomain: "bubbit-hub.firebaseapp.com",
    projectId: "bubbit-hub", storageBucket: "bubbit-hub.firebasestorage.app",
    messagingSenderId: "183100911164", appId: "1:183100911164:web:c1a1fa4b273d9ddccf5d39"
  };
  const db = getFirestore(initializeApp(firebaseConfig));

  // 모달 열기/닫기
  window.openTaskModal = () => document.getElementById('task-modal').style.display = 'flex';
  window.closeTaskModal = () => {
    document.getElementById('task-modal').style.display = 'none';
    document.getElementById('task-title').value = '';
    document.getElementById('task-desc').value = '';
  };

  // 파이어베이스에 새 작업 저장
  window.saveNewTask = async () => {
    const title = document.getElementById('task-title').value;
    const channel = document.getElementById('task-channel').value;
    const desc = document.getElementById('task-desc').value;

    if(!title) { alert('작업 제목을 입력해주세요.'); return; }

    try {
      await addDoc(collection(db, "tasks"), {
        title: title, channel: channel, description: desc,
        status: "대기중", createdAt: new Date().toISOString()
      });
      showToast("새 작업이 성공적으로 저장되었습니다!");
      closeTaskModal();
    } catch (e) {
      showToast("저장에 실패했습니다.");
      console.error(e);
    }
  };

  // 서버에서 데이터 실시간 불러오기
  onSnapshot(collection(db, "tasks"), (snap) => {
    document.getElementById('dash-task-cnt').innerText = snap.docs.length + "건";
    const tbody = document.getElementById('dash-recent-list');
    tbody.innerHTML = '';
    snap.docs.slice(0, 7).forEach(doc => {
      const d = doc.data();
      tbody.innerHTML += `<tr>
        <td><strong>${d.title}</strong></td>
        <td>${d.channel}</td>
        <td style="color:var(--text-sub); max-width:200px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${d.description}</td>
        <td><span class="badge">${d.status}</span></td>
      </tr>`;
    });
  });

  onSnapshot(collection(db, "campaigns"), (snap) => document.getElementById('dash-camp-cnt').innerText = snap.docs.length + "건");

  function showToast(msg) {
    const t = document.getElementById('toast'); t.innerText = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
