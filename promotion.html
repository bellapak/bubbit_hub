<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/><title>행사 및 프로모션 - 버빗 허브</title><link href="style.css" rel="stylesheet"/></head><body><div id="app"><main class="main-content" data-page="promotion">

<div class="view-container">
<div class="card">
<div class="card-header"><span class="card-title">신규 행사 등록</span></div>
<div class="input-group">
<input class="input-field" id="promo-title" placeholder="기획전 행사명" style="flex:2;"/>
<input class="input-field" id="promo-benefit" placeholder="혜택 (예: 20% 할인)"/>
<input class="input-field" id="promo-period" placeholder="기간 (예: 5/1~5/10)"/>
<button class="btn btn-primary" onclick="savePromo()">등록</button>
</div>
<table class="data-table">
<thead><tr><th>상태</th><th>행사명</th><th>혜택 내용</th><th>기간</th><th>관리</th></tr></thead>
<tbody id="promo-list"></tbody>
</table>
</div>
</div>
</main></div><div id="toast">메시지</div><script src="./layout.js" type="module"></script><script type="module">
  import { db, requireAuth } from "./firebase.js";
  import { collection, addDoc, onSnapshot, doc, deleteDoc }
    from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const esc = window.escapeHTML || ((v) => String(v ?? "").replace(/[&<>\"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m])));
  const dash = (v) => String(v ?? "").trim() || "-";

  requireAuth(() => {
    window.savePromo = async () => {
      const title = document.getElementById("promo-title").value;
      const benefit = document.getElementById("promo-benefit").value;
      const period = document.getElementById("promo-period").value;
      if (!title) return;
      await addDoc(collection(db, "promotions"), { title, benefit, period, status: "기획중" });
      document.querySelectorAll(".input-field").forEach(i => i.id !== "search-input" && (i.value = ""));
      showToast("행사가 등록되었습니다");
    };

    window.deletePromo = async (id) => {
      if (confirm("삭제하시겠습니까?")) await deleteDoc(doc(db, "promotions", id));
    };

    onSnapshot(collection(db, "promotions"), (snap) => {
      const list = document.getElementById("promo-list");
      list.innerHTML = "";
      snap.forEach(docSnap => {
        const d = docSnap.data();
        list.innerHTML += `<tr class="searchable-row">
          <td><span class="badge">${esc(dash(d.status))}</span></td>
          <td><strong>${esc(dash(d.title))}</strong></td>
          <td style="color:var(--text-sub)">${esc(dash(d.benefit))}</td>
          <td style="color:var(--text-sub)">${esc(dash(d.period))}</td>
          <td><button class="btn" style="padding:6px 12px;font-size:12px;" onclick="deletePromo('${docSnap.id}')">종료</button></td>
        </tr>`;
      });
    });
  });

  window.searchTable = function () {
    const kw = document.getElementById("search-input").value.toLowerCase();
    document.querySelectorAll(".searchable-row, .searchable-item").forEach(el => {
      el.style.display = el.innerText.toLowerCase().includes(kw) ? "" : "none";
    });
  };
  window.showToast = function (msg) {
    const t = document.getElementById("toast"); t.innerText = msg; t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2500);
  };
</script></body></html>
