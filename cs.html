<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/><title>CS 및 VOC - 버빗 허브</title><link href="style.css" rel="stylesheet"/></head><body><div id="app"><main class="main-content" data-page="cs">

<div class="view-container">
<div class="card">
<div class="card-header"><span class="card-title">고객 문의 및 클레임 등록</span></div>
<div class="input-group">
<select class="input-field" id="cs-type" style="width:140px;">
<option value="상품문의">상품문의</option>
<option value="배송 반품">배송 반품</option>
<option value="고객건의 VOC">고객건의 VOC</option>
</select>
<input class="input-field" id="cs-content" placeholder="문의 내용 요약" style="flex:2;"/>
<button class="btn btn-primary" onclick="saveCS()">접수</button>
</div>
<table class="data-table">
<thead><tr><th>유형</th><th>내용</th><th>접수일</th><th>관리</th></tr></thead>
<tbody id="cs-list"></tbody>
</table>
</div>
</div>
</main></div><div id="toast">메시지</div><script src="./layout.js" type="module"></script><script type="module">
  import { db, requireAuth } from "./firebase.js";
  import { collection, addDoc, onSnapshot, doc, deleteDoc }
    from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const esc = window.escapeHTML || ((v) => String(v ?? "").replace(/[&<>\"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m])));
  const dash = (v) => String(v ?? "").trim() || "-";

  requireAuth(() => {
    window.saveCS = async () => {
      const type = document.getElementById("cs-type").value;
      const content = document.getElementById("cs-content").value;
      if (!content) return;
      await addDoc(collection(db, "cs"), { type, content, date: new Date().toLocaleDateString() });
      document.getElementById("cs-content").value = "";
      showToast("접수되었습니다");
    };

    window.deleteCS = async (id) => {
      if (confirm("삭제하시겠습니까?")) await deleteDoc(doc(db, "cs", id));
    };

    onSnapshot(collection(db, "cs"), (snap) => {
      const list = document.getElementById("cs-list");
      list.innerHTML = "";
      snap.forEach(docSnap => {
        const d = docSnap.data();
        list.innerHTML += `<tr class="searchable-row">
          <td><span class="badge" style="background:#E8F3FF;color:#3182F6">${esc(dash(d.type))}</span></td>
          <td><strong>${esc(dash(d.content))}</strong></td>
          <td style="color:var(--text-sub)">${esc(dash(d.date))}</td>
          <td><button class="btn" style="padding:6px 12px;font-size:12px;" onclick="deleteCS('${docSnap.id}')">완료</button></td>
        </tr>`;
      });
    });
  });

  window.searchTable = function () {
    const kw = document.getElementById("search-input").value.toLowerCase();
    document.querySelectorAll(".searchable-row, .searchable-item").forEach(el => {
      el.style.display = el.innerText.toLowerCase().includes(kw) ? "" : "none";
    });
  };
  window.showToast = function (msg) {
    const t = document.getElementById("toast"); t.innerText = msg; t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2500);
  };
</script></body></html>
