<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>로그인 - 버빗 허브</title>
<link rel="stylesheet" href="style.css">
<style>
  .login-container { max-width: 400px; margin: 100px auto; }
</style>
</head>
<body>
<div class="login-container">
  <div class="card">
    <h2 style="font-size:24px; font-weight:800; margin-bottom:32px;">로그인</h2>
    <input type="email" id="email" class="input-field" placeholder="이메일" style="margin-bottom:12px;">
    <input type="password" id="password" class="input-field" placeholder="비밀번호" style="margin-bottom:24px;">
    <button class="btn btn-primary" style="width:100%; height:50px;" onclick="login()">로그인</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  
  const firebaseConfig = { /* 동일한 설정값 입력 */ };
  const auth = getAuth(initializeApp(firebaseConfig));

  window.login = async () => {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    try {
      await signInWithEmailAndPassword(auth, email, password);
      window.location.href = 'index.html';
    } catch(e) { alert("로그인 실패: 이메일과 비밀번호를 확인하세요."); }
  };
</script>
</body>
</html>
