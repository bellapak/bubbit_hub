<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 - 버빗 허브</title>
<link rel="stylesheet" href="style.css">
<style>
  body { min-height:100vh; align-items:center; justify-content:center; background:var(--bg-app); }
  .login-container { width:100%; max-width:430px; padding:24px; }
  .login-card { background:#fff; border-radius:32px; padding:48px; box-shadow:0 16px 40px rgba(0,0,0,.06); }
  .login-logo { font-size:28px; font-weight:900; letter-spacing:-.8px; text-align:center; margin-bottom:10px; }
  .login-desc { color:var(--text-sub); text-align:center; line-height:1.55; margin-bottom:34px; font-weight:600; }
  .google-btn { width:100%; height:58px; border:0; border-radius:18px; background:#191F28; color:#fff; font-size:16px; font-weight:800; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; transition:.2s; font-family:var(--font); }
  .google-btn:hover { background:#333D4B; transform:translateY(-1px); }
  .google-btn:disabled { opacity:.55; cursor:not-allowed; transform:none; }
  .google-icon { width:22px; height:22px; border-radius:50%; background:#fff; display:inline-flex; align-items:center; justify-content:center; color:#191F28; font-size:13px; font-weight:900; }
  .login-error, .login-info { display:none; margin-top:16px; padding:13px 14px; border-radius:14px; font-size:13px; font-weight:700; line-height:1.45; text-align:center; }
  .login-error { background:#FEECEF; color:#F04452; }
  .login-info { background:#E8F3FF; color:#3182F6; }
  .login-help { margin-top:24px; color:var(--text-light); font-size:12px; line-height:1.5; text-align:center; }
</style>
</head>
<body>
<div class="login-container">
  <div class="login-card">
    <div class="login-logo">Bubbit Hub</div>
    <div class="login-desc">버빗 브랜드 운영 허브<br>허용된 Google 계정으로 로그인해주세요.</div>

    <button id="google-login-btn" class="google-btn" type="button">
      <span class="google-icon">G</span>
      Google로 로그인
    </button>

    <div id="login-error" class="login-error"></div>
    <div id="login-info" class="login-info"></div>

    <p class="login-help">
      별도 비밀번호는 저장하지 않습니다.<br>
      접속 가능 계정은 <strong>app-auth.js</strong>의 allowedEmails에서 관리합니다.
    </p>
  </div>
</div>

<script type="module">
  import { signInWithGoogleAccount, redirectIfAlreadySignedIn, authErrorMessage } from "./app-auth.js";

  const loginBtn = document.getElementById("google-login-btn");
  const errorEl = document.getElementById("login-error");
  const infoEl = document.getElementById("login-info");

  function showError(message) {
    infoEl.style.display = "none";
    errorEl.innerText = message;
    errorEl.style.display = "block";
  }

  function showInfo(message) {
    errorEl.style.display = "none";
    infoEl.innerText = message;
    infoEl.style.display = "block";
  }

  const params = new URLSearchParams(location.search);
  if (params.get("reason") === "login-required") showInfo("서비스 이용을 위해 Google 로그인이 필요합니다.");
  if (params.get("reason") === "not-allowed") showError("허용되지 않은 Google 계정입니다. 관리자에게 계정 추가를 요청해주세요.");
  if (params.get("reason") === "logout") showInfo("로그아웃되었습니다.");

  redirectIfAlreadySignedIn();

  loginBtn.addEventListener("click", async () => {
    loginBtn.disabled = true;
    loginBtn.innerHTML = '<span class="google-icon">G</span> 로그인 확인 중...';
    errorEl.style.display = "none";

    try {
      await signInWithGoogleAccount();
      location.href = "index.html";
    } catch (error) {
      if (error.code === "bubbit/not-allowed-email") {
        showError("허용되지 않은 Google 계정입니다. 관리자에게 계정 추가를 요청해주세요.");
      } else {
        showError(authErrorMessage(error));
      }
    } finally {
      loginBtn.disabled = false;
      loginBtn.innerHTML = '<span class="google-icon">G</span> Google로 로그인';
    }
  });
</script>
</body>
</html>
