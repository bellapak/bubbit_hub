<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일정 및 캘린더 - 버빗 허브</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <nav class="sidebar">
    <div class="brand-logo">Bubbit Hub</div>
    
    <div class="nav-label">WORKSPACE</div>
    <a href="index.html" class="nav-item">01 통합 대시보드</a>
    <a href="content.html" class="nav-item">02 제품 및 콘텐츠</a>
    <a href="campaign.html" class="nav-item active">03 일정 및 캘린더</a>
    <a href="promotion.html" class="nav-item">04 행사 및 프로모션</a>
    
    <div class="nav-label">MANAGEMENT</div>
    <a href="cs.html" class="nav-item">05 CS 및 VOC 관리</a>
    <a href="issue.html" class="nav-item">06 이슈 로그</a>
    <a href="guide.html" class="nav-item">07 브랜드 가이드라인</a>
    <a href="data.html" class="nav-item">08 빅데이터 연동</a>
    <a href="account_issue.html" class="nav-item">09 계정 관리</a>
  </nav>

  <main class="main-content">
    <header class="topbar">
      <div class="topbar-title">
        <a href="index.html" class="btn" style="padding:10px 14px;font-size:14px;">홈</a>
        <span>일정 및 캘린더</span>
      </div>
      <div style="display:flex; gap:12px;">
        <button class="btn btn-primary" onclick="openTaskModal()">새 일정 등록</button>
      </div>
    </header>

    <div class="view-container">
      <div class="calendar">
        <div class="calendar-header">
          <button class="btn" id="prevMonth" onclick="changeMonth(-1)">&lt;</button>
          <h2 class="calendar-title" id="currentMonthYear">2026. 05</h2>
          <button class="btn" id="nextMonth" onclick="changeMonth(1)">&gt;</button>
        </div>
        <div class="calendar-grid" id="cal-grid">
          </div>
      </div>
    </div>
  </main>
</div>

<div id="task-modal" class="modal-overlay">
  <div class="modal-box">
    <h3 style="margin-bottom: 24px; font-size: 18px; font-weight: 700;">일정 등록</h3>
    <input id="task-title" class="input-field" placeholder="캠페인 / 일정 제목" style="margin-bottom: 12px;">
    <input type="date" id="task-date" class="input-field" style="margin-bottom: 12px;" title="목표 기한">
    <select id="task-channel" class="input-field" style="margin-bottom: 12px;">
      <option value="Instagram">Instagram</option>
      <option value="Meta Ads">Meta Ads</option>
      <option value="자사몰">자사몰</option>
      <option value="기타(내부일정)">기타(내부일정)</option>
    </select>
    <textarea id="task-desc" class="input-field" rows="4" placeholder="상세 내용 요약" style="margin-bottom: 24px; resize:vertical;"></textarea>
    <div style="display: flex; gap: 10px; justify-content: flex-end;">
      <button class="btn" onclick="closeTaskModal()">취소</button>
      <button class="btn btn-primary" onclick="saveNewTask()">저장하기</button>
    </div>
  </div>
</div>

<div id="toast">메시지</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  const firebaseConfig = { apiKey: "AIzaSyDFxVAAkgut4hsmafMMxRo2Ge2P7td6JOs", authDomain: "bubbit-hub.firebaseapp.com", projectId: "bubbit-hub", storageBucket: "bubbit-hub.firebasestorage.app", messagingSenderId: "183100911164", appId: "1:183100911164:web:c1a1fa4b273d9ddccf5d39" };
  const db = getFirestore(initializeApp(firebaseConfig));

  // 모달 기능 (대시보드와 동일)
  window.openTaskModal = () => document.getElementById('task-modal').style.display = 'flex';
  window.closeTaskModal = () => document.getElementById('task-modal').style.display = 'none';

  window.saveNewTask = async () => {
    const title = document.getElementById('task-title').value;
    const targetDate = document.getElementById('task-date').value;
    const channel = document.getElementById('task-channel').value;
    const desc = document.getElementById('task-desc').value;
    if(!title || !targetDate) { alert("제목과 날짜를 입력해주세요."); return; }
    try {
      await addDoc(collection(db, "tasks"), { title, targetDate, channel, description: desc, status: "대기중", createdAt: new Date().toISOString() });
      closeTaskModal(); showToast("일정이 달력에 등록되었습니다");
      document.getElementById('task-title').value = ''; document.getElementById('task-date').value = ''; document.getElementById('task-desc').value = '';
    } catch (e) { showToast("실패했습니다"); }
  };

  // 🔹 달력(Calendar) 로직
  let currentDate = new Date(); // 시스템 현재 시간 기준
  let allTasks = []; // DB에서 불러온 전체 일정 저장용

  function renderCalendar() {
    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();
    document.getElementById('currentMonthYear').innerText = `${year}. ${String(month + 1).padStart(2, '0')}`;

    const grid = document.getElementById('cal-grid');
    grid.innerHTML = '';
    const dows = ['일', '월', '화', '수', '목', '금', '토'];
    dows.forEach(d => grid.innerHTML += `<div class="calendar-dow">${d}</div>`);

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    // 빈 칸 채우기
    for(let i=0; i<firstDay; i++) { grid.innerHTML += `<div class="calendar-day empty"></div>`; }

    // 날짜 및 일정 채우기
    for(let day=1; day<=daysInMonth; day++) {
      const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      
      // 해당 날짜에 맞는 일정 찾기
      const dayTasks = allTasks.filter(t => t.targetDate === dateStr);
      let taskHtml = '';
      
      dayTasks.forEach(task => {
        // 채널별 색상 라벨링
        let colorClass = 'etc';
        if(task.channel.includes('Instagram')) colorClass = 'insta';
        if(task.channel.includes('Meta')) colorClass = 'meta';
        if(task.channel.includes('자사몰')) colorClass = 'mall';
        
        taskHtml += `<div class="cal-event ${colorClass}" title="${task.title}\n(${task.channel})">${task.title}</div>`;
      });

      grid.innerHTML += `
        <div class="calendar-day">
          <div class="day-num">${day}</div>
          ${taskHtml}
        </div>
      `;
    }
  }

  window.changeMonth = (dir) => {
    currentDate.setMonth(currentDate.getMonth() + dir);
    renderCalendar();
  };

  // DB 연동하여 실시간으로 달력에 반영
  onSnapshot(collection(db, "tasks"), (snap) => {
    allTasks = snap.docs.map(doc => doc.data());
    renderCalendar();
  });

  window.showToast = function(msg) {
    const t = document.getElementById('toast'); t.innerText = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  };
</script>
</body>
</html>
