<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일정 및 캠페인 - 버빗 허브</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
:root { --primary: #111827; --primary-hover: #374151; --bg-app: #F4F5F7; --bg-surface: #FFFFFF; --text-main: #111827; --text-sub: #4B5563; --text-light: #9CA3AF; --border: #E5E7EB; --font: 'Pretendard', sans-serif; --radius: 12px; --radius-sm: 8px; --shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03); }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg-app); color: var(--text-main); display: flex; height: 100vh; font-size: 13px; letter-spacing: -0.3px; }
#app { display: flex; width: 100%; }
.sidebar { width: 240px; background: var(--bg-surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 24px 0; z-index: 10; }
.brand-logo { padding: 0 24px 32px; font-weight: 800; font-size: 18px; color: var(--text-main); }
.nav-item { display: flex; align-items: center; padding: 12px 24px; color: var(--text-sub); text-decoration: none; font-weight: 500; transition: all 0.2s; border-left: 3px solid transparent; }
.nav-item:hover { background: var(--bg-app); color: var(--text-main); }
.nav-item.active { background: #F3F4F6; color: var(--text-main); border-left-color: var(--text-main); font-weight: 700; }
.main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar { height: 64px; background: var(--bg-surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 32px; font-size: 18px; font-weight: 700; z-index: 5; }
.view-container { flex: 1; overflow-y: auto; padding: 32px; display: flex; flex-direction: column; gap: 24px; }
.card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); }
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 16px; }
.card-title { font-size: 16px; font-weight: 800; display: flex; align-items: center; gap: 8px; margin: 0; }
.btn { padding: 8px 16px; border-radius: var(--radius-sm); font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: #fff; color: var(--text-main); font-family: var(--font); transition: all 0.2s; font-size: 13px; display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
.btn:hover { background: var(--bg-app); border-color: var(--text-sub); }
.btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
.btn-primary:hover { background: var(--primary-hover); color: #fff; }
.data-table { width: 100%; border-collapse: collapse; }
.data-table th, .data-table td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
.badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; background: #F3F4F6; color: var(--text-sub); }
#toast { position: fixed; bottom: 24px; right: 24px; background: var(--text-main); color: #fff; padding: 12px 24px; border-radius: var(--radius-sm); font-weight: 600; opacity: 0; transition: 0.3s; z-index: 1000; box-shadow: var(--shadow); }
#toast.show { opacity: 1; transform: translateY(-10px); }
</style>
</head>
<body>
<div id="app">
 <nav class="sidebar">
    <div class="brand-logo">Bubbit Hub</div>
    <a href="index.html" class="nav-item">01 통합 대시보드</a>
    <a href="content.html" class="nav-item">02 제품 및 콘텐츠</a>
    <a href="campaign.html" class="nav-item">03 일정 및 캠페인</a>
    <a href="promotion.html" class="nav-item">04 행사 및 프로모션</a>
    <a href="cs.html" class="nav-item">05 CS 및 VOC 관리</a>
    <a href="issue.html" class="nav-item">06 이슈 로그</a>
    <a href="guide.html" class="nav-item">07 브랜드 가이드라인</a>
    <a href="data.html" class="nav-item">08 빅데이터 연동</a>
    <a href="account_issue.html" class="nav-item">09 계정 관리</a>
  </nav>
  <main class="main-content">
    <header class="topbar">
    <div style="display: flex; align-items: center; gap: 16px;">
      <a href="index.html" class="btn" style="text-decoration: none; padding: 6px 10px; font-size: 16px;" title="홈으로 이동">🏠</a>
      <span>현재 페이지 이름 쓰기 (예: 일정 및 캠페인)</span>
    </div>
    
    <div style="display: flex; align-items: center; gap: 12px;">
      <input type="text" id="search-input" class="input-field" style="width: 200px; margin: 0;" placeholder="🔍 내용 검색..." onkeyup="searchTable()">
      </div>
  </header>
    <div class="view-container">
      <div class="card">
        <div class="card-header">
          <span class="card-title">진행 중인 캠페인 목록</span>
          <button class="btn btn-primary" onclick="addCampaign()">+ 캠페인 등록 (서버 저장)</button>
        </div>
        <table class="data-table">
          <thead><tr><th>캠페인명</th><th>채널</th><th>상태</th><th>등록일</th></tr></thead>
          <tbody id="campaign-list-body"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>
<div id="toast">메시지</div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  
  const firebaseConfig = {
    apiKey: "AIzaSyDFxVAAkgut4hsmafMMxRo2Ge2P7td6JOs", authDomain: "bubbit-hub.firebaseapp.com",
    projectId: "bubbit-hub", storageBucket: "bubbit-hub.firebasestorage.app",
    messagingSenderId: "183100911164", appId: "1:183100911164:web:c1a1fa4b273d9ddccf5d39"
  };
  const db = getFirestore(initializeApp(firebaseConfig));

  window.addCampaign = async function() {
    const title = prompt("새 캠페인 이름을 입력하세요:");
    if (!title) return;
    await addDoc(collection(db, "campaigns"), { title, channel: "Instagram", status: "준비중", date: new Date().toLocaleDateString() });
    showToast("캠페인이 성공적으로 등록되었습니다!");
  };

  onSnapshot(collection(db, "campaigns"), (snap) => {
    const tbody = document.getElementById('campaign-list-body');
    tbody.innerHTML = '';
    snap.forEach(doc => {
      const d = doc.data();
      tbody.innerHTML += `<tr><td><strong>${d.title}</strong></td><td>${d.channel}</td><td><span class="badge">${d.status}</span></td><td>${d.date}</td></tr>`;
    });
  });

  function showToast(msg) {
    const t = document.getElementById('toast'); t.innerText = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
  // 🔹 테이블(표) 내용 실시간 검색 기능
  window.searchTable = function() {
    const keyword = document.getElementById('search-input').value.toLowerCase();
    // 데이터가 들어가는 tbody 안의 모든 tr 태그를 찾습니다.
    const rows = document.querySelectorAll('tbody tr'); 
    
    rows.forEach(row => {
      // 입력한 키워드가 행(row)의 텍스트에 포함되어 있으면 보여주고, 아니면 숨깁니다.
      if (row.innerText.toLowerCase().includes(keyword)) {
        row.style.display = '';
      } else {
        row.style.display = 'none';
      }
    });
  };
</script>
</body>
</html>
