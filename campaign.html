<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일정 및 캠페인 - 버빗 허브</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <nav class="sidebar">
    <div class="brand-logo">Bubbit Hub</div>
    <a href="index.html" class="nav-item">01 통합 대시보드</a>
    <a href="content.html" class="nav-item">02 제품 및 콘텐츠</a>
    <a href="campaign.html" class="nav-item active">03 일정 및 캠페인</a>
    <a href="promotion.html" class="nav-item">04 행사 및 프로모션</a>
    <a href="cs.html" class="nav-item">05 CS 및 VOC 관리</a>
    <a href="issue.html" class="nav-item">06 이슈 로그</a>
    <a href="guide.html" class="nav-item">07 브랜드 가이드라인</a>
    <a href="data.html" class="nav-item">08 빅데이터 연동</a>
    <a href="account_issue.html" class="nav-item">09 계정 관리</a>
  </nav>
  <main class="main-content">
    <header class="topbar">
      <div class="topbar-title">
        <a href="index.html" class="btn" style="padding:10px 14px;font-size:14px;">홈</a>
        <span>일정 및 캠페인 관리</span>
      </div>
      <div style="display:flex; gap:12px;">
        <input type="text" id="search-input" class="input-field" style="width:240px; margin:0;" placeholder="내용 검색" onkeyup="searchTable()">
      </div>
    </header>
    <div class="view-container">
      <div class="card">
        <div class="card-header">
          <span class="card-title">진행 중인 캠페인 목록</span>
          <button class="btn btn-primary" onclick="addCampaign()">캠페인 등록</button>
        </div>
        <table class="data-table">
          <thead><tr><th>캠페인명</th><th>채널</th><th>상태</th><th>등록일</th></tr></thead>
          <tbody id="campaign-list-body"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>
<div id="toast">메시지</div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  const firebaseConfig = { apiKey: "AIzaSyDFxVAAkgut4hsmafMMxRo2Ge2P7td6JOs", authDomain: "bubbit-hub.firebaseapp.com", projectId: "bubbit-hub", storageBucket: "bubbit-hub.firebasestorage.app", messagingSenderId: "183100911164", appId: "1:183100911164:web:c1a1fa4b273d9ddccf5d39" };
  const db = getFirestore(initializeApp(firebaseConfig));

  window.addCampaign = async function() {
    const title = prompt("새 캠페인 이름을 입력하세요");
    if (!title) return;
    await addDoc(collection(db, "campaigns"), { title, channel: "Instagram", status: "준비중", date: new Date().toLocaleDateString() });
    showToast("캠페인이 등록되었습니다");
  };

  onSnapshot(collection(db, "campaigns"), (snap) => {
    const tbody = document.getElementById('campaign-list-body'); tbody.innerHTML = '';
    snap.forEach(doc => {
      const d = doc.data();
      tbody.innerHTML += `<tr class="searchable-row"><td><strong>${d.title}</strong></td><td>${d.channel}</td><td><span class="badge">${d.status}</span></td><td><span style="color:var(--text-sub)">${d.date}</span></td></tr>`;
    });
  });

  window.searchTable = function() {
    const keyword = document.getElementById('search-input').value.toLowerCase();
    document.querySelectorAll('.searchable-row, .searchable-item').forEach(el => {
      el.style.display = el.innerText.toLowerCase().includes(keyword) ? '' : 'none';
    });
  };
  window.showToast = function(msg) {
    const t = document.getElementById('toast'); t.innerText = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  };
</script>
</body>
</html>
