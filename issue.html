<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/><title>이슈 로그 - 버빗 허브</title><link href="style.css" rel="stylesheet"/></head><body><div id="app"><main class="main-content" data-page="issue">

<div class="view-container">
<div class="card">
<div class="card-header"><span class="card-title">신규 이슈 등록</span></div>
<div class="input-group">
<input class="input-field" id="issue-title" placeholder="이슈 내용 (예: 배송 지연)" style="flex:2;"/>
<select class="input-field" id="issue-level" style="width:120px;">
<option value="보통">보통</option>
<option value="긴급">긴급</option>
<option value="치명적">치명적</option>
</select>
<select class="input-field" id="issue-status" style="width:120px;">
<option value="대기중">대기중</option>
<option value="진행중">진행중</option>
<option value="해결됨">해결됨</option>
</select>
<button class="btn btn-primary" onclick="saveIssue()">등록</button>
</div>
<table class="data-table">
<thead><tr><th>상태</th><th>이슈 내용</th><th>심각도</th><th>등록일</th><th>관리</th></tr></thead>
<tbody id="issue-list"></tbody>
</table>
</div>
</div>
</main></div><div id="toast">메시지</div><script src="./layout.js" type="module"></script><script type="module">
  import { db, requireAuth } from "./firebase.js";
  import { collection, addDoc, onSnapshot, doc, deleteDoc }
    from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const esc = window.escapeHTML || ((v) => String(v ?? "").replace(/[&<>\"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m])));
  const dash = (v) => String(v ?? "").trim() || "-";

  requireAuth(() => {
    window.saveIssue = async () => {
      const title = document.getElementById("issue-title").value;
      const level = document.getElementById("issue-level").value;
      const status = document.getElementById("issue-status").value;
      if (!title) return;
      await addDoc(collection(db, "issues"), { title, level, status, date: new Date().toLocaleDateString() });
      document.getElementById("issue-title").value = "";
      showToast("이슈가 등록되었습니다");
    };

    window.deleteIssue = async (id) => {
      if (confirm("이슈를 삭제할까요?")) { await deleteDoc(doc(db, "issues", id)); showToast("삭제 완료"); }
    };

    onSnapshot(collection(db, "issues"), (snap) => {
      const list = document.getElementById("issue-list");
      list.innerHTML = "";
      snap.forEach(docSnap => {
        const d = docSnap.data();
        let bs = d.status === "해결됨" ? "background:#E8F8F0;color:#11894C;" : (d.status === "대기중" ? "background:#FFF4E6;color:#D76B00;" : "");
        list.innerHTML += `<tr class="searchable-row">
          <td><span class="badge" style="${bs}">${esc(dash(d.status))}</span></td>
          <td><strong>${esc(dash(d.title))}</strong></td>
          <td><span style="color:var(--text-sub)">${esc(dash(d.level))}</span></td>
          <td style="color:var(--text-sub)">${esc(dash(d.date))}</td>
          <td><button class="btn btn-danger" style="padding:6px 12px;font-size:12px;" onclick="deleteIssue('${docSnap.id}')">삭제</button></td>
        </tr>`;
      });
    });
  });

  window.searchTable = function () {
    const kw = document.getElementById("search-input").value.toLowerCase();
    document.querySelectorAll(".searchable-row, .searchable-item").forEach(el => {
      el.style.display = el.innerText.toLowerCase().includes(kw) ? "" : "none";
    });
  };
  window.showToast = function (msg) {
    const t = document.getElementById("toast"); t.innerText = msg; t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2500);
  };
</script></body></html>
