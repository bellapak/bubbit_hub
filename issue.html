<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이슈 로그 - 버빗 허브</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
<nav class="sidebar">
    <div class="brand-logo">Bubbit Hub</div>
    
    <div class="nav-label">WORKSPACE</div>
    <a href="index.html" class="nav-item">01 통합 대시보드</a>
    <a href="content.html" class="nav-item">02 제품 및 콘텐츠</a>
    <a href="calender.html" class="nav-item">03 일정 및 캘린더</a>
    <a href="promotion.html" class="nav-item">04 행사 및 프로모션</a>
    
    <div class="nav-label">MANAGEMENT</div>
    <a href="cs.html" class="nav-item">05 CS 및 VOC 관리</a>
    <a href="issue.html" class="nav-item">06 이슈 로그</a>
    <a href="guide.html" class="nav-item">07 브랜드 가이드라인</a>
    <a href="data.html" class="nav-item">08 빅데이터 연동</a>
    <a href="account_issue.html" class="nav-item">09 계정 관리</a>
  </nav>
  <main class="main-content">
    <header class="topbar">
      <div class="topbar-title">
        <a href="index.html" class="btn" style="padding:10px 14px;font-size:14px;">홈</a>
        <span>이슈 로그</span>
      </div>
      <div style="display:flex; gap:12px;">
        <input type="text" id="search-input" class="input-field" style="width:240px; margin:0;" placeholder="내용 검색" onkeyup="searchTable()">
      </div>
    </header>
    <div class="view-container">
      <div class="card">
        <div class="card-header"><span class="card-title">신규 이슈 등록</span></div>
        <div class="input-group">
          <input id="issue-title" class="input-field" style="flex:2;" placeholder="이슈 내용 (예: 배송 지연)">
          <select id="issue-level" class="input-field" style="width:120px;">
            <option value="보통">보통</option>
            <option value="긴급">긴급</option>
            <option value="치명적">치명적</option>
          </select>
          <select id="issue-status" class="input-field" style="width:120px;">
            <option value="대기중">대기중</option>
            <option value="진행중">진행중</option>
            <option value="해결됨">해결됨</option>
          </select>
          <button class="btn btn-primary" onclick="saveIssue()">등록</button>
        </div>
        <table class="data-table">
          <thead><tr><th>상태</th><th>이슈 내용</th><th>심각도</th><th>등록일</th><th>관리</th></tr></thead>
          <tbody id="issue-list"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>
<div id="toast">메시지</div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  const firebaseConfig = { apiKey: "AIzaSyDFxVAAkgut4hsmafMMxRo2Ge2P7td6JOs", authDomain: "bubbit-hub.firebaseapp.com", projectId: "bubbit-hub", storageBucket: "bubbit-hub.firebasestorage.app", messagingSenderId: "183100911164", appId: "1:183100911164:web:c1a1fa4b273d9ddccf5d39" };
  const db = getFirestore(initializeApp(firebaseConfig));

  window.saveIssue = async () => {
    const title = document.getElementById('issue-title').value;
    const level = document.getElementById('issue-level').value;
    const status = document.getElementById('issue-status').value;
    if(!title) return;
    await addDoc(collection(db, "issues"), { title, level, status, date: new Date().toLocaleDateString() });
    document.getElementById('issue-title').value = ''; showToast("이슈가 등록되었습니다");
  };

  window.deleteIssue = async (id) => {
    if(confirm("이슈를 삭제할까요?")) { await deleteDoc(doc(db, "issues", id)); showToast("삭제 완료"); }
  };

  onSnapshot(collection(db, "issues"), (snap) => {
    const list = document.getElementById('issue-list'); list.innerHTML = '';
    snap.forEach(docSnap => {
      const d = docSnap.data();
      let badgeStyle = d.status === '해결됨' ? 'background:#E8F8F0;color:#11894C;' : (d.status === '대기중' ? 'background:#FFF4E6;color:#D76B00;' : '');
      list.innerHTML += `<tr class="searchable-row"><td><span class="badge" style="${badgeStyle}">${d.status}</span></td><td><strong>${d.title}</strong></td><td><span style="color:var(--text-sub)">${d.level}</span></td><td style="color:var(--text-sub)">${d.date}</td><td><button class="btn btn-danger" style="padding:6px 12px;font-size:12px;" onclick="deleteIssue('${docSnap.id}')">삭제</button></td></tr>`;
    });
  });

  window.searchTable = function() {
    const keyword = document.getElementById('search-input').value.toLowerCase();
    document.querySelectorAll('.searchable-row, .searchable-item').forEach(el => {
      el.style.display = el.innerText.toLowerCase().includes(keyword) ? '' : 'none';
    });
  };
  window.showToast = function(msg) {
    const t = document.getElementById('toast'); t.innerText = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
const auth = getAuth();

// 페이지 접속 시 로그인 상태 확인
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = 'login.html'; // 로그인 안 되어 있으면 로그인 페이지로 강제 이동
  } else {
    // 🔹 지정된 이메일만 허용하는 화이트리스트 로직
    const allowedEmails = ["admin@bubbit.com", "member@bubbit.com"]; 
    if (!allowedEmails.includes(user.email)) {
      alert("접근 권한이 없습니다.");
      window.location.href = 'login.html';
    }
  }
});
</script>
</body>
</html>
