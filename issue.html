<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이슈 로그 - 버빗 허브</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
:root { --primary: #111827; --primary-hover: #374151; --bg-app: #F4F5F7; --bg-surface: #FFFFFF; --text-main: #111827; --text-sub: #4B5563; --text-light: #9CA3AF; --border: #E5E7EB; --font: 'Pretendard', sans-serif; --radius: 12px; --radius-sm: 8px; --shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03); }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg-app); color: var(--text-main); display: flex; height: 100vh; font-size: 13px; letter-spacing: -0.3px; }
#app { display: flex; width: 100%; }
.sidebar { width: 240px; background: var(--bg-surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 24px 0; z-index: 10; overflow-y: auto; }
.brand-logo { padding: 0 24px 32px; font-weight: 800; font-size: 18px; color: var(--text-main); }
.nav-item { display: flex; align-items: center; padding: 10px 24px; color: var(--text-sub); text-decoration: none; font-weight: 500; transition: all 0.2s; border-left: 3px solid transparent; }
.nav-item:hover { background: var(--bg-app); color: var(--text-main); }
.nav-item.active { background: #F3F4F6; color: var(--text-main); border-left-color: var(--text-main); font-weight: 700; }
.main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar { height: 64px; background: var(--bg-surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 32px; font-size: 18px; font-weight: 700; z-index: 5; }
.view-container { flex: 1; overflow-y: auto; padding: 32px; display: flex; flex-direction: column; gap: 24px; }
.card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); }
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 16px; }
.card-title { font-size: 16px; font-weight: 800; display: flex; align-items: center; gap: 8px; margin: 0; }
.btn { padding: 8px 16px; border-radius: var(--radius-sm); font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: #fff; color: var(--text-main); font-family: var(--font); transition: all 0.2s; font-size: 13px; display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
.btn:hover { background: var(--bg-app); border-color: var(--text-sub); }
.btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
.btn-primary:hover { background: var(--primary-hover); color: #fff; }
.input-field { padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; outline: none; font-family: var(--font); width: 100%; transition: all 0.2s; }
.input-group { display: flex; gap: 10px; margin-bottom: 20px; }
.data-table { width: 100%; border-collapse: collapse; }
.data-table th, .data-table td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
.badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; background: #fee2e2; color: #991b1b; }
.badge.done { background: #d1fae5; color: #065f46; }
.badge.wait { background: #fef3c7; color: #92400e; }
#toast { position: fixed; bottom: 24px; right: 24px; background: var(--text-main); color: #fff; padding: 12px 24px; border-radius: var(--radius-sm); font-weight: 600; opacity: 0; transition: 0.3s; z-index: 1000; box-shadow: var(--shadow); }
#toast.show { opacity: 1; transform: translateY(-10px); }
</style>
</head>
<body>
<div id="app">
  <nav class="sidebar">
    <div class="brand-logo">Bubbit Hub</div>
    <a href="index.html" class="nav-item">01 통합 대시보드</a>
    <a href="content.html" class="nav-item">02 제품 및 콘텐츠</a>
    <a href="campaign.html" class="nav-item">03 일정 및 캠페인</a>
    <a href="promotion.html" class="nav-item">04 행사 및 프로모션</a>
    <a href="cs.html" class="nav-item">05 CS 및 VOC 관리</a>
    <a href="issue.html" class="nav-item active">06 이슈 로그</a>
    <a href="guide.html" class="nav-item">07 브랜드 가이드라인</a>
    <a href="data.html" class="nav-item">08 빅데이터 연동</a>
    <a href="account_issue.html" class="nav-item">09 계정 관리</a>
  </nav>

  <main class="main-content">
    <header class="topbar">
      <div style="display: flex; align-items: center; gap: 16px;">
        <a href="index.html" class="btn" style="text-decoration: none; padding: 6px 10px; font-size: 16px;" title="홈으로 이동">🏠</a>
        <span>이슈 로그 (문제 및 변경사항 이력)</span>
      </div>
      <div style="display: flex; align-items: center; gap: 12px;">
        <input type="text" id="search-input" class="input-field" style="width: 200px; margin: 0;" placeholder="🔍 현재 페이지 검색..." onkeyup="searchTable()">
      </div>
    </header>

    <div class="view-container">
      <div class="card">
        <div class="card-header"><span class="card-title">⚠️ 신규 이슈 등록</span></div>
        <div class="input-group">
          <input id="issue-title" class="input-field" style="flex: 2;" placeholder="이슈 내용 (예: 배송 지연, 결제 오류)">
          <select id="issue-level" class="input-field" style="width: 120px;">
            <option value="보통">보통</option>
            <option value="긴급">긴급</option>
            <option value="치명적">치명적</option>
          </select>
          <select id="issue-status" class="input-field" style="width: 120px;">
            <option value="대기중">대기중</option>
            <option value="진행중">진행중</option>
            <option value="해결됨">해결됨</option>
          </select>
          <button class="btn btn-primary" onclick="saveIssue()">등록</button>
        </div>
        
        <table class="data-table">
          <thead><tr><th>상태</th><th>이슈 내용</th><th>심각도</th><th>등록일</th><th>관리</th></tr></thead>
          <tbody id="issue-list"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>
<div id="toast">메시지</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  const firebaseConfig = { apiKey: "AIzaSyDFxVAAkgut4hsmafMMxRo2Ge2P7td6JOs", authDomain: "bubbit-hub.firebaseapp.com", projectId: "bubbit-hub", storageBucket: "bubbit-hub.firebasestorage.app", messagingSenderId: "183100911164", appId: "1:183100911164:web:c1a1fa4b273d9ddccf5d39" };
  const db = getFirestore(initializeApp(firebaseConfig));

  window.saveIssue = async () => {
    const title = document.getElementById('issue-title').value;
    const level = document.getElementById('issue-level').value;
    const status = document.getElementById('issue-status').value;
    if(!title) return;
    await addDoc(collection(db, "issues"), { title, level, status, date: new Date().toLocaleDateString() });
    document.getElementById('issue-title').value = '';
    showToast("이슈가 등록되었습니다.");
  };

  window.deleteIssue = async (id) => {
    if(confirm("이슈를 삭제할까요?")) { await deleteDoc(doc(db, "issues", id)); showToast("삭제 완료"); }
  };

  onSnapshot(collection(db, "issues"), (snap) => {
    const list = document.getElementById('issue-list'); list.innerHTML = '';
    snap.forEach(docSnap => {
      const d = docSnap.data();
      let badgeClass = d.status === '해결됨' ? 'done' : (d.status === '대기중' ? 'wait' : '');
      list.innerHTML += `<tr class="searchable-row"><td><span class="badge ${badgeClass}">${d.status}</span></td><td>${d.title}</td><td><strong>${d.level}</strong></td><td>${d.date}</td><td><button class="btn" style="padding:4px 8px;font-size:11px;" onclick="deleteIssue('${docSnap.id}')">삭제</button></td></tr>`;
    });
  });

  // 🔹 검색 기능 자바스크립트
  window.searchTable = function() {
    const keyword = document.getElementById('search-input').value.toLowerCase();
    const rows = document.querySelectorAll('.searchable-row');
    rows.forEach(row => { row.style.display = row.innerText.toLowerCase().includes(keyword) ? '' : 'none'; });
  };

  window.showToast = function(msg) {
    const t = document.getElementById('toast'); t.innerText = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
