<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/><title>빅데이터 연동 - 버빗 허브</title><link href="style.css" rel="stylesheet"/></head><body><div id="app"><main class="main-content" data-page="data">

<div class="view-container">
<div class="grid-3">
<div class="card" style="padding:24px;">
<div style="color:var(--text-sub); font-weight:700; margin-bottom:12px;">Instagram (Mock)</div>
<div style="font-size:24px; font-weight:800;">45,000<span style="font-size:14px; color:var(--text-sub); font-weight:500;"> 도달</span></div>
</div>
<div class="card" style="padding:24px;">
<div style="color:var(--text-sub); font-weight:700; margin-bottom:12px;">Meta Ads (Mock)</div>
<div style="font-size:24px; font-weight:800;">₩1,200,000<span style="font-size:14px; color:var(--text-sub); font-weight:500;"> 지출</span></div>
</div>
<div class="card" style="padding:24px;">
<div style="color:var(--text-sub); font-weight:700; margin-bottom:12px;">Cafe24 (Mock)</div>
<div style="font-size:24px; font-weight:800;">154건<span style="font-size:14px; color:var(--text-sub); font-weight:500;"> 전환</span></div>
</div>
</div>
<div class="card">
<div class="card-header">
<span class="card-title">외부 API 연동 상태</span>
<button class="btn btn-primary" onclick="addIntegration()">새 연동 설정</button>
</div>
<table class="data-table">
<thead><tr><th>플랫폼명</th><th>상태</th><th>연동 날짜</th><th>관리</th></tr></thead>
<tbody id="integration-list"></tbody>
</table>
</div>
</div>
</main></div><div id="toast">메시지</div><script src="./layout.js" type="module"></script><script type="module">
  import { db, requireAuth } from "./firebase.js";
  import { collection, addDoc, onSnapshot }
    from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  requireAuth(() => {
    window.addIntegration = async () => {
      const platform = prompt("연동할 플랫폼 (예: Slack):");
      if (!platform) return;
      try {
        await addDoc(collection(db, "integrations"), { platform, status: "연동 완료", date: new Date().toLocaleDateString() });
        showToast("연동 설정 저장됨");
      } catch (e) {}
    };

    onSnapshot(collection(db, "integrations"), (snap) => {
      const tbody = document.getElementById("integration-list");
      tbody.innerHTML = "";
      snap.forEach(doc => {
        const d = doc.data();
        tbody.innerHTML += `<tr class="searchable-row">
          <td><strong>${d.platform}</strong></td>
          <td><span class="badge" style="background:#E8F3FF;color:#3182F6">${d.status}</span></td>
          <td style="color:var(--text-sub)">${d.date}</td>
          <td><button class="btn" style="padding:6px 12px;font-size:12px;">수정</button></td>
        </tr>`;
      });
    });
  });

  window.searchTable = function () {
    const kw = document.getElementById("search-input").value.toLowerCase();
    document.querySelectorAll(".searchable-row, .searchable-item").forEach(el => {
      el.style.display = el.innerText.toLowerCase().includes(kw) ? "" : "none";
    });
  };
  window.showToast = function (msg) {
    const t = document.getElementById("toast"); t.innerText = msg; t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2500);
  };
</script></body></html>
