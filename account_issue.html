<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>계정 및 이슈 관리 - 버빗 허브</title>
<style>
/* --- 공통 디자인 시스템 --- */
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
:root {
  --primary: #111827; --primary-hover: #374151; --bg-app: #F9FAFB; --bg-surface: #FFFFFF;
  --text-main: #111827; --text-sub: #4B5563; --text-light: #9CA3AF; --border: #E5E7EB;
  --font: 'Pretendard', sans-serif; --radius: 8px; --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background-color: var(--bg-app); color: var(--text-main); display: flex; height: 100vh; font-size: 13px; }

/* 레이아웃 */
#app { display: flex; width: 100%; }
.sidebar { width: 240px; background: var(--bg-surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 24px 0; }
.nav-item { display: flex; align-items: center; padding: 10px 24px; color: var(--text-sub); text-decoration: none; font-weight: 500; }
.nav-item.active { background: #F3F4F6; color: var(--text-main); border-left: 2px solid var(--text-main); font-weight: 700; }
.main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar { height: 60px; background: var(--bg-surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 32px; font-size: 16px; font-weight: 700; }
.view-container { flex: 1; overflow-y: auto; padding: 32px; }

/* 카드 및 폼 */
.card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow-sm); margin-bottom: 24px; }
.card-title { font-size: 14px; font-weight: 700; margin-bottom: 20px; display: block; }
.input-group { display: flex; gap: 10px; margin-bottom: 20px; }
.input-field { padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; outline: none; }
.btn { padding: 8px 16px; border-radius: 6px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: #fff; }
.btn-primary { background: var(--primary); color: #fff; border: none; }
.data-table { width: 100%; border-collapse: collapse; }
.data-table th, .data-table td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
.badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; background: #fee2e2; color: #991b1b; } /* 이슈 상태용 */

#toast { position: fixed; bottom: 24px; right: 24px; background: var(--text-main); color: #fff; padding: 12px 24px; border-radius: 6px; opacity: 0; transition: 0.3s; }
#toast.show { opacity: 1; }
</style>
</head>
<body>

<div id="app">
  <nav class="sidebar">
    <div style="padding: 0 24px 32px; font-weight: 800; font-size: 18px;">Bubbit Hub</div>
    <a href="index.html" class="nav-item">01 통합 대시보드</a>
    <a href="content.html" class="nav-item">02 콘텐츠 허브</a>
    <a href="campaign.html" class="nav-item">03 일정 및 캠페인</a>
    <a href="guide.html" class="nav-item">04 브랜드 가이드라인</a>
    <a href="account_issue.html" class="nav-item active">05 계정 및 이슈 관리</a>
  </nav>

  <main class="main-content">
    <header class="topbar">계정 및 이슈 관리</header>
    <div class="view-container">
      
      <div class="card">
        <span class="card-title">🔑 브랜드 공용 계정 정보</span>
        <div class="input-group">
          <input id="acc-service" class="input-field" placeholder="서비스명 (예: 인스타)">
          <input id="acc-id" class="input-field" placeholder="아이디">
          <input id="acc-pw" class="input-field" placeholder="비밀번호">
          <button class="btn btn-primary" onclick="saveAccount()">등록</button>
        </div>
        <table class="data-table">
          <thead><tr><th>서비스</th><th>아이디</th><th>비밀번호</th><th>관리</th></tr></thead>
          <tbody id="account-list"></tbody>
        </table>
      </div>

      <div class="card">
        <span class="card-title">⚠️ 긴급 이슈 및 리스크 등록</span>
        <div class="input-group">
          <input id="issue-title" class="input-field" style="flex: 2;" placeholder="이슈 내용 (예: 재고 부족, 광고 승인 거절)">
          <select id="issue-level" class="input-field">
            <option value="보통">보통</option>
            <option value="긴급">긴급</option>
            <option value="치명적">치명적</option>
          </select>
          <button class="btn btn-primary" onclick="saveIssue()">이슈 등록</button>
        </div>
        <table class="data-table">
          <thead><tr><th>상태</th><th>내용</th><th>심각도</th><th>등록일</th></tr></thead>
          <tbody id="issue-list"></tbody>
        </table>
      </div>

    </div>
  </main>
</div>

<div id="toast">메시지</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "본인의_API_KEY",
    authDomain: "bubbit-hub.firebaseapp.com",
    projectId: "bubbit-hub",
    storageBucket: "bubbit-hub.appspot.com",
    appId: "본인의_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // --- 계정 저장 및 불러오기 ---
  window.saveAccount = async () => {
    const service = document.getElementById('acc-service').value;
    const id = document.getElementById('acc-id').value;
    const pw = document.getElementById('acc-pw').value;
    if(!service || !id) return;

    await addDoc(collection(db, "accounts"), { service, id, pw });
    document.querySelectorAll('.input-field').forEach(i => i.value = '');
    showToast("계정 정보가 저장되었습니다.");
  };

  onSnapshot(collection(db, "accounts"), (snap) => {
    const list = document.getElementById('account-list');
    list.innerHTML = '';
    snap.forEach(doc => {
      const d = doc.data();
      list.innerHTML += `<tr><td>${d.service}</td><td>${d.id}</td><td>${d.pw}</td><td><button class="btn">삭제</button></td></tr>`;
    });
  });

  // --- 이슈 저장 및 불러오기 ---
  window.saveIssue = async () => {
    const title = document.getElementById('issue-title').value;
    const level = document.getElementById('issue-level').value;
    if(!title) return;

    await addDoc(collection(db, "issues"), { 
      title, level, status: "진행중", date: new Date().toLocaleDateString() 
    });
    document.getElementById('issue-title').value = '';
    showToast("이슈가 등록되었습니다.");
  };

  onSnapshot(collection(db, "issues"), (snap) => {
    const list = document.getElementById('issue-list');
    list.innerHTML = '';
    snap.forEach(doc => {
      const d = doc.data();
      list.innerHTML += `<tr><td><span class="badge">${d.status}</span></td><td>${d.title}</td><td>${d.level}</td><td>${d.date}</td></tr>`;
    });
  });

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
