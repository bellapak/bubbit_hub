<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일정 및 캘린더 - 버빗 허브</title>
<link rel="stylesheet" href="style.css">
<style>
  .prop-grid { display: grid; grid-template-columns: 100px 1fr; gap: 12px; margin-bottom: 20px; align-items: center; }
  .prop-label { color: var(--text-sub); font-weight: 600; font-size: 14px; }
  .calendar-day { cursor: pointer; transition: background 0.1s; }
  .calendar-day:hover { background: #F9FAFB; }
  .day-header { display: flex; justify-content: space-between; align-items: center; }
  .add-inline-btn { opacity: 0; font-size: 12px; color: var(--blue); cursor: pointer; transition: 0.1s; }
  .calendar-day:hover .add-inline-btn { opacity: 1; }
</style>
</head>
<body>
<div id="app">
  <nav class="sidebar">
    <div class="brand-logo">Bubbit Hub</div>
    
    <div class="nav-label">WORKSPACE</div>
    <a href="index.html" class="nav-item">01 통합 대시보드</a>
    <a href="content.html" class="nav-item">02 제품 및 콘텐츠</a>
    <a href="calender.html" class="nav-item active">03 일정 및 캘린더</a>
    <a href="promotion.html" class="nav-item">04 행사 및 프로모션</a>
    
    <div class="nav-label">MANAGEMENT</div>
    <a href="cs.html" class="nav-item">05 CS 및 VOC 관리</a>
    <a href="issue.html" class="nav-item">06 이슈 로그</a>
    <a href="guide.html" class="nav-item">07 브랜드 가이드라인</a>
    <a href="data.html" class="nav-item">08 빅데이터 연동</a>
    <a href="account_issue.html" class="nav-item">09 계정 관리</a>
  </nav>

  <main class="main-content">
    <header class="topbar">
      <div class="topbar-title">
        <a href="index.html" class="btn" style="padding:10px 14px;font-size:14px;">홈</a>
        <span>일정 및 캘린더</span>
      </div>
      <div style="display:flex; gap:12px; align-items: center;">
        <input type="text" id="search-input" class="input-field" style="width:200px; margin:0;" placeholder="일정 검색" onkeyup="searchCalendar()">
        <button class="btn btn-primary" onclick="openCreateModal()">새 일정 추가</button>
      </div>
    </header>

    <div class="view-container">
      <div class="calendar">
        <div class="calendar-header">
          <button class="btn" onclick="changeMonth(-1)">&lt;</button>
          <h2 class="calendar-title" id="currentMonthYear">2026. 05</h2>
          <button class="btn" onclick="changeMonth(1)">&gt;</button>
        </div>
        <div class="calendar-grid" id="cal-grid"></div>
      </div>
    </div>
  </main>
</div>

<div id="create-modal" class="modal-overlay">
  <div class="modal-box" style="width: 460px;">
    <h3 style="margin-bottom: 24px; font-size: 18px; font-weight: 700;">새 일정 항목 추가</h3>
    <div class="prop-grid">
      <div class="prop-label">제목</div>
      <input id="new-title" class="input-field" placeholder="일정 제목 입력">
      <div class="prop-label">날짜</div>
      <input type="date" id="new-date" class="input-field">
      <div class="prop-label">담당자</div>
      <input id="new-owner" class="input-field" placeholder="이름 입력">
      <div class="prop-label">상태</div>
      <select id="new-status" class="input-field">
        <option value="예정">예정</option>
        <option value="진행중">진행중</option>
        <option value="완료">완료</option>
        <option value="보류">보류</option>
      </select>
      <div class="prop-label">우선순위</div>
      <select id="new-priority" class="input-field">
        <option value="보통">보통</option>
        <option value="높음">높음</option>
        <option value="낮음">낮음</option>
      </select>
      <div class="prop-label">채널 분류</div>
      <select id="new-channel" class="input-field">
        <option value="Instagram">Instagram</option>
        <option value="Meta Ads">Meta Ads</option>
        <option value="자사몰">자사몰</option>
        <option value="내부행사">내부행사</option>
      </select>
    </div>
    <textarea id="new-desc" class="input-field" rows="4" placeholder="세부 내용 기술" style="margin-bottom: 24px; resize: vertical;"></textarea>
    <div style="display: flex; gap: 10px; justify-content: flex-end;">
      <button class="btn" onclick="closeModal('create-modal')">취소</button>
      <button class="btn btn-primary" onclick="saveNewSchedule()">생성</button>
    </div>
  </div>
</div>

<div id="detail-modal" class="modal-overlay">
  <div class="modal-box" style="width: 460px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
      <h3 id="detail-title-display" style="font-size: 18px; font-weight: 700; margin: 0;">일정 상세</h3>
      <button class="btn btn-danger" id="delete-btn" style="padding: 6px 12px; font-size: 12px;">삭제</button>
    </div>
    <input type="hidden" id="detail-id">
    <div class="prop-grid">
      <div class="prop-label">제목</div>
      <input id="detail-title" class="input-field">
      <div class="prop-label">날짜</div>
      <input type="date" id="detail-date" class="input-field">
      <div class="prop-label">담당자</div>
      <input id="detail-owner" class="input-field">
      <div class="prop-label">상태</div>
      <select id="detail-status" class="input-field">
        <option value="예정">예정</option>
        <option value="진행중">진행중</option>
        <option value="완료">완료</option>
        <option value="보류">보류</option>
      </select>
      <div class="prop-label">우선순위</div>
      <select id="detail-priority" class="input-field">
        <option value="보통">보통</option>
        <option value="높음">높음</option>
        <option value="낮음">낮음</option>
      </select>
      <div class="prop-label">채널 분류</div>
      <select id="detail-channel" class="input-field">
        <option value="Instagram">Instagram</option>
        <option value="Meta Ads">Meta Ads</option>
        <option value="자사몰">자사몰</option>
        <option value="내부행사">내부행사</option>
      </select>
    </div>
    <textarea id="detail-desc" class="input-field" rows="4" style="margin-bottom: 24px; resize: vertical;"></textarea>
    <div style="display: flex; gap: 10px; justify-content: flex-end;">
      <button class="btn" onclick="closeModal('detail-modal')">닫기</button>
      <button class="btn btn-primary" onclick="updateSchedule()">수정 내용 저장</button>
    </div>
  </div>
</div>

<div id="toast">메시지</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  
  const firebaseConfig = { apiKey: "AIzaSyDFxVAAkgut4hsmafMMxRo2Ge2P7td6JOs", authDomain: "bubbit-hub.firebaseapp.com", projectId: "bubbit-hub", storageBucket: "bubbit-hub.firebasestorage.app", messagingSenderId: "183100911164", appId: "1:183100911164:web:c1a1fa4b273d9ddccf5d39" };
  const db = getFirestore(initializeApp(firebaseConfig));
  const targetCollection = collection(db, "brand_schedules");

  let currentDate = new Date();
  let allSchedules = [];
  let currentSearchKeyword = "";

  // 대한민국 공휴일 및 국가 기념일 빅데이터 가이드 오브젝트 (2026년 기준)
  const koreanHolidays2026 = {
    "2026-01-01": "신정", "2026-02-16": "설날 연휴", "2026-02-17": "설날", "2026-02-18": "설날 연휴",
    "2026-03-01": "삼일절", "2026-05-01": "노동절", "2026-05-05": "어린이날", "2026-05-24": "부처님오신날",
    "2026-05-25": "부처님오신날 대체공휴일", "2026-06-03": "지방선거일", "2026-06-06": "현충일",
    "2026-08-15": "광복절", "2026-09-24": "추석 연휴", "2026-09-25": "추석", "2026-09-26": "추석 연휴",
    "2026-10-03": "개천절", "2026-10-09": "한글날", "2026-12-25": "기독탄신일"
  };

  window.openCreateModal = (defaultDate = "") => {
    document.getElementById('create-modal').style.display = 'flex';
    if(defaultDate) document.getElementById('new-date').value = defaultDate;
  };
  window.closeModal = (id) => document.getElementById(id).style.display = 'none';

  window.saveNewSchedule = async () => {
    const title = document.getElementById('new-title').value.trim();
    const date = document.getElementById('new-date').value;
    const owner = document.getElementById('new-owner').value.trim();
    const status = document.getElementById('new-status').value;
    const priority = document.getElementById('new-priority').value;
    const channel = document.getElementById('new-channel').value;
    const desc = document.getElementById('new-desc').value.trim();
    if(!title || !date) return alert("제목과 날짜는 필수 입력 사항입니다.");
    try {
      await addDoc(targetCollection, { title, date, owner, status, priority, channel, desc, createdAt: new Date().toISOString() });
      closeModal('create-modal'); showToast("새 일정이 등록되었습니다."); clearCreateForm();
    } catch(e) { showToast("등록 실패"); }
  };

  window.openDetailModal = (id) => {
    const item = allSchedules.find(s => s.id === id);
    if(!item) return;
    document.getElementById('detail-id').value = item.id;
    document.getElementById('detail-title').value = item.title;
    document.getElementById('detail-date').value = item.date;
    document.getElementById('detail-owner').value = item.owner || "";
    document.getElementById('detail-status').value = item.status;
    document.getElementById('detail-priority').value = item.priority;
    document.getElementById('detail-channel').value = item.channel;
    document.getElementById('detail-desc').value = item.desc || "";
    document.getElementById('detail-modal').style.display = 'flex';
    document.getElementById('delete-btn').onclick = () => deleteSchedule(item.id);
  };

  window.updateSchedule = async () => {
    const id = document.getElementById('detail-id').value;
    try {
      await updateDoc(doc(db, "brand_schedules", id), {
        title: document.getElementById('detail-title').value.trim(),
        date: document.getElementById('detail-date').value,
        owner: document.getElementById('detail-owner').value.trim(),
        status: document.getElementById('detail-status').value,
        priority: document.getElementById('detail-priority').value,
        channel: document.getElementById('detail-channel').value,
        desc: document.getElementById('detail-desc').value.trim()
      });
      closeModal('detail-modal'); showToast("일정이 수정되었습니다.");
    } catch(e) { showToast("수정 실패"); }
  };

  window.deleteSchedule = async (id) => {
    if(!confirm("이 일정을 삭제하시겠습니까?")) return;
    try { await deleteDoc(doc(db, "brand_schedules", id)); closeModal('detail-modal'); showToast("일정이 삭제되었습니다."); } catch(e) { showToast("삭제 실패"); }
  };

  function renderCalendar() {
    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();
    document.getElementById('currentMonthYear').innerText = `${year}. ${String(month + 1).padStart(2, '0')}`;

    const grid = document.getElementById('cal-grid');
    grid.innerHTML = '';
    ['일', '월', '화', '수', '목', '금', '토'].forEach(d => grid.innerHTML += `<div class="calendar-dow">${d}</div>`);

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    // 대한민국 현재 시점 기준 분석 연동 센서
    const sysDate = new Date();
    const sysYear = sysDate.getFullYear();
    const sysMonth = sysDate.getMonth();
    const sysDay = sysDate.getDate();

    for(let i=0; i<firstDay; i++) { grid.innerHTML += `<div class="calendar-day empty"></div>`; }

    for(let day=1; day<=daysInMonth; day++) {
      const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      
      const holidayName = koreanHolidays2026[dateStr];
      const dayTasks = allSchedules.filter(t => {
        const matchDate = t.date === dateStr;
        const matchKeyword = currentSearchKeyword ? t.title.toLowerCase().includes(currentSearchKeyword) || (t.owner && t.owner.toLowerCase().includes(currentSearchKeyword)) : true;
        return matchDate && matchKeyword;
      });

      // 공휴일과 사내 정규 일정을 하나로 결합
      let dayItems = [];
      if(holidayName) dayItems.push({ type: 'holiday', title: holidayName });
      dayTasks.forEach(t => dayItems.push({ type: 'schedule', ...t }));

      const totalCount = dayItems.length;

      // 3단 적재 처리 가이드라인 및 제한 엔진 구축
      const visibleItems = dayItems.slice(0, 3);
      const hasMore = totalCount > 3;

      let taskHtml = '';
      visibleItems.forEach(item => {
        if(item.type === 'holiday') {
          taskHtml += `<div class="cal-event holiday">${item.title}</div>`;
        } else {
          let colorClass = 'etc';
          if(item.channel === 'Instagram') colorClass = 'insta';
          if(item.channel === 'Meta Ads') colorClass = 'meta';
          if(item.channel === '자사몰') colorClass = 'mall';
          taskHtml += `<div class="cal-event ${colorClass}" onclick="event.stopPropagation(); openDetailModal('${item.id}')">${item.title}</div>`;
        }
      });

      // 3개 이상일 시 하단에 생략 리스트 가시성 부여
      if(hasMore) {
        taskHtml += `<div class="cal-event-more">...</div>`;
      }

      // 오늘 날짜 원형 하이라이트 트리거 판단
      const isToday = (year === sysYear && month === sysMonth && day === sysDay) ? 'today' : '';
      
      // 날짜 옆 총 개수 표기 장치
      const countLabel = totalCount > 0 ? `<span class="day-count">(${totalCount})</span>` : '';

      const dayCell = document.createElement('div');
      dayCell.className = 'calendar-day';
      dayCell.innerHTML = `
        <div class="day-header">
          <div style="display:flex; align-items:center;">
            <div class="day-num ${isToday}">${day}</div>
            ${countLabel}
          </div>
          <div class="add-inline-btn" onclick="event.stopPropagation(); openCreateModal('${dateStr}')">+</div>
        </div>
        ${taskHtml}
      `;
      grid.appendChild(dayCell);
    }
  }

  window.changeMonth = (dir) => { currentDate.setMonth(currentDate.getMonth() + dir); renderCalendar(); };
  window.searchCalendar = () => { currentSearchKeyword = document.getElementById('search-input').value.toLowerCase().trim(); renderCalendar(); };
  function clearCreateForm() { document.getElementById('new-title').value = ''; document.getElementById('new-date').value = ''; document.getElementById('new-owner').value = ''; document.getElementById('new-desc').value = ''; }

  onSnapshot(targetCollection, (snap) => {
    allSchedules = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    renderCalendar();
  });

  window.showToast = function(msg) {
    const t = document.getElementById('toast'); t.innerText = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  };
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
const auth = getAuth();

// 페이지 접속 시 로그인 상태 확인
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = 'login.html'; // 로그인 안 되어 있으면 로그인 페이지로 강제 이동
  } else {
    // 🔹 지정된 이메일만 허용하는 화이트리스트 로직
    const allowedEmails = ["admin@bubbit.com", "member@bubbit.com"]; 
    if (!allowedEmails.includes(user.email)) {
      alert("접근 권한이 없습니다.");
      window.location.href = 'login.html';
    }
  }
});
</script>
</body>
</html>
