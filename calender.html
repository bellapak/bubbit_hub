<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>일정 및 캘린더 - 버빗 허브</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <nav class="sidebar">
    <div class="brand-logo">Bubbit Hub</div>
    <div class="nav-label">WORKSPACE</div>
    <a href="index.html" class="nav-item">01 통합 대시보드</a>
    <a href="content.html" class="nav-item">02 제품 및 콘텐츠</a>
    <a href="calender.html" class="nav-item active">03 일정 및 캘린더</a>
    <a href="promotion.html" class="nav-item">04 행사 및 프로모션</a>
    <div class="nav-label">MANAGEMENT</div>
    <a href="cs.html" class="nav-item">05 CS 및 VOC 관리</a>
    <a href="issue.html" class="nav-item">06 이슈 로그</a>
  </nav>
  
  <main class="main-content">
    <div class="calendar-header" style="display:flex; justify-content:space-between; margin-bottom:20px;">
      <button onclick="changeMonth(-1)">이전 달</button>
      <h2 id="currentMonthYear"></h2>
      <button onclick="changeMonth(1)">다음 달</button>
    </div>
    <div class="calendar-grid" id="cal-grid"></div>
  </main>
</div>

<script>
  let currentDate = new Date();
  let allSchedules = []; // Firestore 데이터 배열
  let koreanHolidays = {};
  const GOOGLE_API_KEY = "YOUR_API_KEY_HERE";
  const HOLIDAY_CAL_ID = "ko.south_korea#holiday@group.v.calendar.google.com";

  async function fetchHolidays(year, month) {
    const url = `https://www.googleapis.com/calendar/v3/calendars/${HOLIDAY_CAL_ID}/events?key=${GOOGLE_API_KEY}&timeMin=${new Date(year, month, 1).toISOString()}&timeMax=${new Date(year, month + 1, 0).toISOString()}`;
    try {
      const res = await fetch(url);
      const data = await res.json();
      koreanHolidays = {};
      if (data.items) data.items.forEach(e => koreanHolidays[e.start.date] = e.summary);
      renderCalendar();
    } catch (e) { console.error("공휴일 로드 실패", e); }
  }

  function renderCalendar() {
    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();
    document.getElementById('currentMonthYear').innerText = `${year}년 ${month + 1}월`;
    const grid = document.getElementById('cal-grid');
    const fragment = document.createDocumentFragment();
    
    ['일','월','화','수','목','금','토'].forEach(d => {
        const div = document.createElement('div');
        div.className = 'calendar-dow';
        div.textContent = d;
        fragment.appendChild(div);
    });

    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const firstDay = new Date(year, month, 1).getDay();
    const todayStr = new Date().toISOString().split('T')[0];

    for(let i = 0; i < firstDay; i++) fragment.appendChild(document.createElement('div'));

    for(let day = 1; day <= daysInMonth; day++) {
      const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const dayDiv = document.createElement('div');
      dayDiv.className = 'calendar-day';
      dayDiv.innerHTML = `<div class="day-header"><div class="day-num ${dateStr === todayStr ? 'today' : ''}">${day}</div>${koreanHolidays[dateStr] ? `<span class="holiday-text">${koreanHolidays[dateStr]}</span>` : ''}</div>`;
      
      allSchedules.filter(t => t.date === dateStr).forEach(t => {
        const diff = Math.ceil((new Date(t.date) - new Date()) / 86400000);
        const dDay = diff === 0 ? "D-Day" : (diff > 0 ? `D-${diff}` : "");
        const eventDiv = document.createElement('div');
        eventDiv.className = 'cal-event';
        eventDiv.innerHTML = `${t.title} <span class="d-day">${dDay}</span>`;
        dayDiv.appendChild(eventDiv);
      });
      fragment.appendChild(dayDiv);
    }
    grid.innerHTML = '';
    grid.appendChild(fragment);
  }

  window.changeMonth = (dir) => { currentDate.setMonth(currentDate.getMonth() + dir); fetchHolidays(currentDate.getFullYear(), currentDate.getMonth()); };
  fetchHolidays(currentDate.getFullYear(), currentDate.getMonth());
</script>
</body>
</html>
