<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일정 및 캘린더 - 버빗 허브</title>
<link rel="stylesheet" href="style.css">
<style>
  .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); }
  .calendar-dow { background: #F9FAFB; padding: 10px; text-align: center; font-weight: 600; font-size: 12px; }
  .calendar-day { background: #fff; min-height: 120px; padding: 8px; display: flex; flex-direction: column; gap: 4px; }
  .day-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .day-num { font-size: 13px; font-weight: 600; color: var(--text-main); width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
  .day-num.today { background: #F04452; color: #fff; border-radius: 50%; }
  .holiday-text { color: #F04452; font-size: 10px; font-weight: 700; }
  .cal-event { font-size: 11px; padding: 4px 6px; border-radius: 4px; background: #f8f9fa; cursor: pointer; display: flex; justify-content: space-between; }
  .d-day { font-size: 9px; color: #3182F6; font-weight: 700; margin-left: 4px; background: #eef5ff; padding: 1px 3px; border-radius: 4px; }
</style>
</head>
<body>

<div id="app">
  <div class="calendar-header">
    <button onclick="changeMonth(-1)">이전</button>
    <span id="currentMonthYear"></span>
    <button onclick="changeMonth(1)">다음</button>
  </div>
  <div class="calendar-grid" id="cal-grid"></div>
</div>

<script>
  let currentDate = new Date();
  let allSchedules = []; // 기존 일정 데이터 변수
  let koreanHolidays = {};
  
  // 구글 캘린더 API 키를 발급받아 입력하세요
  const GOOGLE_API_KEY = "YOUR_API_KEY_HERE"; 
  const HOLIDAY_CAL_ID = "ko.south_korea#holiday@group.v.calendar.google.com";

  async function fetchHolidays(year, month) {
    const timeMin = new Date(year, month, 1).toISOString();
    const timeMax = new Date(year, month + 1, 0).toISOString();
    const url = `https://www.googleapis.com/calendar/v3/calendars/${HOLIDAY_CAL_ID}/events?key=${GOOGLE_API_KEY}&timeMin=${timeMin}&timeMax=${timeMax}`;

    try {
      const res = await fetch(url);
      const data = await res.json();
      koreanHolidays = {};
      if (data.items) {
        data.items.forEach(e => koreanHolidays[e.start.date] = e.summary);
      }
      renderCalendar();
    } catch (e) { console.error("공휴일 로드 실패", e); }
  }

  function renderCalendar() {
    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();
    document.getElementById('currentMonthYear').innerText = `${year}. ${String(month + 1).padStart(2, '0')}`;
    
    const grid = document.getElementById('cal-grid');
    const fragment = document.createDocumentFragment();
    
    ['일','월','화','수','목','금','토'].forEach(day => {
        const div = document.createElement('div');
        div.className = 'calendar-dow';
        div.textContent = day;
        fragment.appendChild(div);
    });

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const todayStr = new Date().toISOString().split('T')[0];

    for(let i = 0; i < firstDay; i++) fragment.appendChild(document.createElement('div'));

    for(let day = 1; day <= daysInMonth; day++) {
      const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const dayDiv = document.createElement('div');
      dayDiv.className = 'calendar-day';
      dayDiv.onclick = () => openCreateModal(dateStr);
      
      const isToday = dateStr === todayStr;
      dayDiv.innerHTML = `
        <div class="day-header">
          <div class="day-num ${isToday ? 'today' : ''}">${day}</div>
          ${koreanHolidays[dateStr] ? `<span class="holiday-text">${koreanHolidays[dateStr]}</span>` : ''}
        </div>`;
      
      allSchedules.filter(t => t.date === dateStr).forEach(t => {
        const diff = Math.ceil((new Date(t.date) - new Date()) / 86400000);
        const dDay = diff === 0 ? "D-Day" : (diff > 0 ? `D-${diff}` : "");
        const eventDiv = document.createElement('div');
        eventDiv.className = 'cal-event';
        eventDiv.innerHTML = `${t.title} <span class="d-day">${dDay}</span>`;
        eventDiv.onclick = (e) => { e.stopPropagation(); openDetailModal(t.id); };
        dayDiv.appendChild(eventDiv);
      });
      fragment.appendChild(dayDiv);
    }
    grid.innerHTML = '';
    grid.appendChild(fragment);
  }

  window.changeMonth = (dir) => { 
    currentDate.setMonth(currentDate.getMonth() + dir); 
    fetchHolidays(currentDate.getFullYear(), currentDate.getMonth());
  };

  // 초기화 호출
  fetchHolidays(currentDate.getFullYear(), currentDate.getMonth());
</script>
</body>
</html>
