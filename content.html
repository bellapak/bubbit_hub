<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제품 및 콘텐츠 - 버빗 허브</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <main class="main-content" data-page="content">
    <div class="view-container">
      <div class="card searchable-item">
        <div class="card-header">
          <span class="card-title">제품 및 콘텐츠</span>
        </div>
        <div class="empty-state">
          제품 상세페이지, 콘텐츠 소재, 캠페인 산출물을 이 영역에서 독립적으로 관리할 수 있습니다.<br>
          브랜드 가이드/에셋 허브는 07 브랜드 가이드라인에서 운영하고, 이 페이지는 제품 상세페이지·콘텐츠 소재·캠페인 산출물을 별도로 관리할 때 확장할 수 있도록 독립 구조만 남겨두었습니다.
        </div>
        <p class="page-note">업로드한 brandguide.html은 07 브랜드 가이드라인의 실제 원본으로 반영되어 있습니다.</p>
      </div>
    </div>
  </main>
</div>
<div id="toast">메시지</div>
<script type="module" src="./layout.js"></script>
<script>
  window.searchTable = function () {
    const input = document.getElementById("search-input");
    const kw = input ? input.value.toLowerCase().trim() : "";
    document.querySelectorAll(".searchable-row, .searchable-item").forEach(el => {
      el.style.display = !kw || el.innerText.toLowerCase().includes(kw) ? "" : "none";
    });
  };
  window.showToast = function (msg) {
    const t = document.getElementById("toast");
    if (!t) return;
    t.innerText = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2500);
  };
</script>
</body>
</html>
